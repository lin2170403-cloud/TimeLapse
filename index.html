<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport"  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="apple-touch-icon" href="icon6.jpg">
<!-- 让 Safari 以“App 模式”打开 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Time Lapse">
<title>Time Lapse</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f6f3;
  --glass:rgba(255,255,255,0.58);
  --glass2:rgba(255,255,255,0.42);
  --glass3:rgba(255,255,255,0.28);
  --border:rgba(165,155,145,0.16);
  --border2:rgba(165,155,145,0.10);
  --text:#37342f;
  --text2:#5f5852;
  --text3:#7d746c;
  --text4:#a59990;
  --lav:rgba(178,158,210,0.22);
  --mint:rgba(138,210,178,0.18);
  --rose:rgba(218,158,168,0.18);
  --lav-s:rgba(105,72,155,0.88);
  --mint-s:rgba(42,128,90,0.85);
  --rose-s:rgba(165,72,85,0.8);
  --green:#68a878;--yellow:#c2a24a;--orange:#cc7e4e;--red:#c05858;
  --font-jp:'YuMincho','Yu Mincho','Hiragino Mincho ProN','HiraMinProN-W3','Hiragino Mincho Pro','MS Mincho','Noto Serif JP','Noto Serif TC',serif;
  --font-tc:'Noto Serif TC','Source Han Serif TC','Songti TC','PingFang TC',serif;
  --font-en:'Cormorant Garamond',serif;
  --sbw:140px;--sbw-c:34px;
}
html{font-size:13px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scrollbar-gutter:stable;overflow-y:scroll}
/* B/1: lang-aware font selection for mixed JP/TC content */
[lang="ja"],[lang="ja-JP"]{font-family:var(--font-jp)!important}
[lang="zh-Hant"],[lang="zh-TW"],[lang="zh-HK"]{font-family:var(--font-tc)!important}
body{
  font-family:var(--font-jp);font-weight:300;color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 8% 0%,var(--lav),transparent 48%),
    radial-gradient(ellipse at 92% 95%,var(--mint),transparent 45%),
    radial-gradient(ellipse at 48% 48%,var(--rose),transparent 55%);
  background-attachment:fixed;
}
input,select,textarea,button{font-family:inherit;font-weight:300;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}

/* ═══ SIDEBAR ═══ */
#sidebar{
  position:fixed;left:0;top:0;z-index:40;height:100vh;
  width:var(--sbw);
  border-right:1px solid var(--border2);
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  display:flex;flex-direction:column;
  transition:width .32s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
#sidebar.collapsed{width:var(--sbw-c)}
#sidebar.collapsed .sb-head{padding:10px 4px 6px;border-bottom:none}
#sidebar.collapsed .sb-head-row{justify-content:center;margin-bottom:0}
#sidebar.collapsed .sb-title,
#sidebar.collapsed .sb-tabs,
#sidebar.collapsed .sb-toggle,
#sidebar.collapsed .sb-items{opacity:0;pointer-events:none;transform:translateX(-10px)}
.sb-head{padding:10px 10px 6px;border-bottom:1px solid var(--border2)}
.sb-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;transition:.24s}
.sb-title{font-size:8px;letter-spacing:.24em;color:var(--text4);text-transform:uppercase;font-family:var(--font-en)}
.sb-tabs{display:flex;flex-direction:column;gap:2px;transition:.22s}
.sb-tab{
  border:1px solid transparent;border-radius:8px;padding:4px 7px;
  text-align:left;cursor:pointer;background:transparent;color:var(--text3);transition:.2s;
}
.sb-tab .t-num{font-size:8px;color:var(--text4);font-family:var(--font-en);font-weight:400}
.sb-tab .t-lbl{font-size:10.5px;margin-top:1px;line-height:1.3}
.sb-tab.on{background:rgba(255,255,255,0.55);border-color:var(--border);color:var(--text)}
.sb-tab:hover:not(.on){background:rgba(255,255,255,0.25)}
.collapsed .t-lbl,.collapsed .sb-tabs,.collapsed .sb-toggle,.collapsed .sb-items{display:none}
.sb-toggle{
  display:flex;gap:2px;padding:5px 8px;border-bottom:1px solid var(--border2);transition:.22s;
}
.sb-pill{
  flex:1;border:none;border-radius:14px;padding:3px 0;font-size:9.5px;
  cursor:pointer;background:transparent;color:var(--text4);transition:.2s;
}
.sb-pill.on{background:rgba(255,255,255,0.5);color:var(--text2)}
.sb-items{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:10px;transition:.22s;
}
.btn-i{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--border);
  background:var(--glass2);color:var(--text3);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;transition:.18s;
  flex-shrink:0;
}
.btn-i:hover{background:var(--glass);color:var(--text2)}
.btn-i svg{width:13px;height:13px}
.btn-add-flip{
  width:68px;height:68px;border-radius:18px;
  border:1.5px dashed rgba(125,116,108,0.18);background:transparent;
  color:var(--text3);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:9px;transition:.2s;
}
.btn-add-flip:hover{border-color:var(--text3);color:var(--text3);background:rgba(255,255,255,0.2)}
.btn-add-flip svg{width:14px;height:14px}

/* ═══ FLIP NOTE ═══ */
.fn-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.fn-row{display:flex;align-items:center;justify-content:center;gap:10px;width:100%}
.fn-box{width:68px;height:68px;perspective:900px;cursor:pointer;flex:0 0 auto}
.fn-inner{
  position:relative;width:100%;height:100%;
  transition:transform .52s cubic-bezier(.4,.1,.2,1);
  transform-style:preserve-3d;
}
.fn-inner.flipped{transform:rotateY(180deg)}
.fn-face{
  position:absolute;inset:0;border-radius:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:visible;
  border:none;box-shadow:none;
}
.fn-front{background:transparent;display:flex;align-items:center;justify-content:center}
.fn-front img{width:100%;height:100%;object-fit:contain;border-radius:0;display:block;image-rendering:auto}
.fn-num{font-family:var(--font-en);font-weight:600;letter-spacing:-.02em;line-height:1}
.fn-num.lg{font-size:18px}
.fn-num.sm{font-size:13px}
.fn-metric{position:relative;display:flex;align-items:center;justify-content:center;min-width:36px;height:36px;flex:0 0 36px}
.fn-metric .fn-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.fn-back{
  transform:rotateY(180deg);
  background:linear-gradient(180deg, rgba(248,246,243,0.78), rgba(248,246,243,0.58));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:14px;
  padding:6px;display:flex;flex-direction:column;justify-content:space-between;
}
.fn-info{font-size:8px;color:var(--text2);line-height:1.42}
.fn-acts{display:flex;align-items:center;justify-content:flex-end;gap:2px}
.fn-acts button{
  width:20px;height:20px;border-radius:50%;border:1px solid var(--border);
  background:var(--glass2);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.18s;
}
.fn-acts button:hover{background:var(--glass)}
.fn-acts button svg{width:10px;height:10px}
.fn-name{
  max-width:72px;text-align:center;font-size:10px;color:var(--text2);
  line-height:1.25;overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-orange{color:var(--orange)}.c-red{color:var(--red)}

/* ═══ MAIN ═══ */
#main{
  margin-left:var(--sbw);min-height:100vh;
  transition:margin-left .32s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
#sidebar.collapsed~#main{margin-left:var(--sbw-c)}
.hdr{
  position:relative;
  display:grid;
  grid-template-columns:1fr auto;
  align-items:start;
  gap:18px;
  padding:26px 8px 12px 18px;
}
.hdr-left{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  text-align:left;
}
.hdr-clock{
  font-family:var(--font-en);font-weight:300;font-size:36px;
  letter-spacing:.05em;color:var(--text);line-height:1;
}
.hdr-date{
  font-family:var(--font-en);font-weight:400;font-size:11.5px;
  color:var(--text2);margin-top:6px;letter-spacing:.1em;
}
.hdr-title{
  font-family:var(--font-en);font-weight:500;font-size:17px;
  letter-spacing:.24em;color:var(--text3);text-transform:uppercase;margin-top:9px;
}

.hdr-end{
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.44);
  background:rgba(255,255,255,0.34);backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%);
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
  color:rgba(90,82,75,.72);transition:.22s;box-shadow:0 8px 24px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.55);
  justify-self:end;margin-right:0;
}
.hdr-end:hover{background:rgba(255,255,255,0.52);color:var(--text2);transform:translateY(-1px)}
.hdr-end svg{width:12px;height:12px}
.fab-stack{position:fixed;right:8px;bottom:14px;z-index:50;display:flex;flex-direction:column;gap:10px}
.fab-btn{
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.44);
  background:rgba(255,255,255,0.34);backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:rgba(90,82,75,.72);transition:.22s;box-shadow:0 8px 24px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.55);
}
.fab-btn:hover{background:rgba(255,255,255,0.52);color:var(--text2);transform:translateY(-1px)}
.fab-btn svg{width:14px;height:14px}
.pm-box{overflow:hidden;display:flex;flex-direction:column}
.mo-box.pm-box.panel-logs{width:min(88vw,1240px);height:min(82vh,780px);max-height:min(82vh,780px)}
.mo-box.pm-box.panel-tags{width:min(62vw,860px);height:min(72vh,680px);max-height:min(72vh,680px)}
.mo-box.pm-box.panel-trends{width:min(56vw,760px);height:min(50vh,420px);max-height:min(50vh,420px)}
.mo-box.pm-box.panel-backup{width:min(42vw,520px);height:auto;max-height:min(58vh,460px)}
.panel-mo{padding:2px}
.pm-body{padding:0 18px 18px;overflow:auto;flex:1;min-height:0}
.log-browser-wrap{overflow:auto;padding-bottom:12px;padding-right:2px}
.pm-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pm-tab{padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.46);cursor:pointer;font-size:11px;color:var(--text3)}
.pm-tab.on{background:rgba(255,255,255,0.74);color:var(--text);border-color:rgba(155,125,195,.24)}
.tag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}
.tag-row-manage{display:grid;grid-template-columns:minmax(0,1fr) 70px auto;gap:8px;align-items:center;padding:8px 10px;border:1px solid var(--border2);border-radius:12px;background:rgba(255,255,255,0.46)}
.tag-name-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.72);font-size:11.5px}
.tag-count{font-size:10.5px;color:var(--text3);text-align:right}
.pm-inline-acts{display:flex;gap:6px;justify-content:flex-end}
.pm-mini{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--glass2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3)}
.pm-mini svg{width:11px;height:11px}
.pm-topfilters{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.pm-topfilters .ff{min-width:130px}
.log-groups{display:flex;flex-direction:column;gap:18px}
.log-day{border:1px solid rgba(165,155,145,.12);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.56),rgba(255,255,255,.40));overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.03)}
.log-day+.log-day{margin-top:0}
.log-day-head{padding:13px 16px;border-bottom:1px solid rgba(165,155,145,.10);font-size:12.5px;color:var(--text);background:rgba(255,255,255,0.46);font-weight:400;letter-spacing:.04em}
.log-cat-head{padding:10px 16px 8px;font-size:9.5px;letter-spacing:.18em;color:var(--text4);text-transform:uppercase;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.10));border-top:1px solid rgba(165,155,145,.10);margin-top:12px}
.log-cat-head:first-child{border-top:none;margin-top:0}
.log-scroll{overflow-x:auto;overflow-y:visible;scrollbar-width:thin;margin:0 0 10px;padding:0 10px 2px}
.log-table-inner{display:table;width:100%;border-collapse:separate;border-spacing:0;font-size:12px;table-layout:fixed}
.log-table-inner th,.log-table-inner td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(165,155,145,.10);white-space:normal;word-break:break-word;line-height:1.65;vertical-align:top}
.log-table-inner th{position:sticky;top:0;z-index:1;font-size:10px;color:var(--text4);letter-spacing:.08em;text-transform:uppercase;background:rgba(248,246,243,.96);font-weight:400}
.log-table-inner tr:last-child td{border-bottom:none}
.log-table-inner tfoot td{font-size:11px;color:var(--text2);background:rgba(255,255,255,0.28);border-top:1.5px solid rgba(165,155,145,.14);border-bottom:none;font-family:var(--font-en)}
.log-table-inner td{color:var(--text2)}
.log-table-inner td:first-child,.log-table-inner th:first-child{width:84px}
.log-table-inner .log-act-cell{white-space:nowrap;text-align:right;vertical-align:middle;width:94px}
.log-item-title{color:var(--text)}
.log-item-sub{font-size:10.5px;color:var(--text3);margin-top:2px}
.log-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:nowrap;align-items:center}
.pm-placeholder{padding:26px 18px;border:1px dashed var(--border);border-radius:18px;background:rgba(255,255,255,0.34);font-size:12px;color:var(--text3);line-height:1.8}
@media (max-width:760px){
  .log-table-inner th,.log-table-inner td{padding:6px 8px;font-size:11px}
  .fab-stack{right:10px;bottom:12px}
}

/* ═══ MODAL ═══ */
.mo{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.12);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.panel-mo{z-index:120}
.edit-mo{z-index:160}
.confirm-mo{z-index:1000!important}
.mo.hidden{display:none}
.mo-box{
  width:100%;max-width:400px;border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  box-shadow:0 16px 48px rgba(0,0,0,0.07);
}
.mo-box.pm-box{
  width:min(74vw,1040px);
  max-width:min(74vw,1040px);
  height:min(72vh,760px);
  max-height:min(72vh,760px);
  border-radius:24px;
}
.mo-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.mo-title{font-size:13px;font-weight:400;color:var(--text)}
.mo-body{padding:0 14px 14px;overflow-wrap:anywhere;word-break:break-word}
.mo-body .ff{margin-bottom:7px}
.mo-body .soft-note,.mo-body a,.soft-note a{overflow-wrap:anywhere;word-break:break-word}
a.auto-link{color:#5b6aa3;text-decoration:underline;text-underline-offset:2px}
a.auto-link:hover{color:#3d4a7d}
.mo-acts{display:flex;justify-content:flex-end;gap:5px;margin-top:10px}
.mo-acts button{
  padding:5px 14px;border-radius:16px;font-size:11px;cursor:pointer;
  border:1px solid var(--border);transition:.2s;
}
.mo-acts .mc{background:transparent;color:var(--text3)}
.mo-acts .mk{background:var(--glass);color:var(--text)}
.mo-acts .mk:hover{background:rgba(255,255,255,0.68)}
/* edit modal */
.edit-box{width:min(72vw,760px);max-width:min(72vw,760px)}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.edit-help{font-size:10px;color:var(--text3);line-height:1.6;margin:-2px 0 10px}
@media (max-width:720px){.edit-grid{grid-template-columns:1fr}.edit-box{width:min(92vw,760px);max-width:min(92vw,760px)}.mo-box.pm-box.panel-logs,.mo-box.pm-box.panel-tags,.mo-box.pm-box.panel-trends,.mo-box.pm-box.panel-backup{width:min(94vw,1040px);max-width:min(94vw,1040px)}.mo-box.pm-box.panel-logs,.mo-box.pm-box.panel-tags{height:min(84vh,760px);max-height:min(84vh,760px)}.mo-box.pm-box.panel-trends,.mo-box.pm-box.panel-backup{height:auto;max-height:min(70vh,520px)}}

/* ═══ WORKSPACE (project & folder) ═══ */
.main-shell{max-width:1480px;margin:0 auto;padding:0 28px 36px}
.main-divider{display:flex;align-items:center;justify-content:center;gap:18px;margin:4px auto 18px;max-width:760px}
.main-divider::before,.main-divider::after{content:'';height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(165,155,145,.22),transparent)}
.main-tabs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;min-width:min(82vw,520px);max-width:600px;width:100%}
.main-tab{padding:9px 14px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.32);cursor:pointer;color:var(--text3);font-size:11px;letter-spacing:.08em;transition:.2s}
.main-tab.on{background:rgba(255,255,255,.76);color:var(--text);box-shadow:0 8px 22px rgba(0,0,0,.04)}
.workspace{border:1px solid var(--border2);background:rgba(255,255,255,.28);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:28px;box-shadow:0 18px 42px rgba(0,0,0,.04);overflow:clip}
.project-wrap,.folder-wrap{display:grid;min-height:640px;width:100%}.project-wrap{grid-template-columns:minmax(0,1fr) 320px}.folder-wrap{grid-template-columns:340px minmax(0,1fr)}
.project-main,.project-side,.folder-side,.folder-main{padding:22px}.project-main{border-right:1px solid var(--border2);min-width:0;overflow:hidden}.folder-main{border-left:1px solid var(--border2);min-width:0}
.section-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}.section-title{font-family:var(--font-en);font-size:18px;letter-spacing:.12em;color:var(--text2)}.soft-note{font-size:11px;color:var(--text3);line-height:1.8}
.chips,.timeline-range{display:flex;gap:8px;flex-wrap:wrap}.chip,.range-btn,.mini-btn,.ghost-btn,.solid-btn{border:1px solid var(--border);background:rgba(255,255,255,.42);color:var(--text2);border-radius:999px;padding:7px 12px;cursor:pointer;transition:.2s;font-size:11px}.chip.on,.range-btn.on{background:rgba(255,255,255,.76);color:var(--text)}
.mini-btn{padding:6px 11px}.solid-btn{background:rgba(255,255,255,.72)}.ghost-btn{background:transparent}
.timeline-today{position:absolute;top:0;bottom:0;width:1.5px;background:rgba(204,126,78,.5);z-index:2;pointer-events:none}

function exS(it,now){const exp=new Date(it.expiryDate),w=new Date(it.warningDate);return{left:dayD(exp,now),st:now>exp?'red':now>=w?'orange':'green'}}
function cyS(it,now){const l=new Date(it.lastDoneAt);const d=it.periodUnit==='hours'?hourD(now,l):dayD(now,l);return{d,num:d<it.cycleX?it.cycleX-d:d,st:d>=it.warnZ?'red':d>=it.cycleX?'orange':d>=it.remindY?'yellow':'green'}}
function garbageS(it,now){
  const last=new Date(it.lastDoneAt);
  const elapsed=dayD(now,last);
  const T=Math.max(1,Number(it.cycleDays||0)||1);
  const count=Number(it.count||0);
  const X=Number(it.limitX||0),Y=Number(it.remindY||0),Z=Number(it.warnZ||0);
  const onCycle = elapsed % T === 0;
  const faded = !onCycle;
  let st='green';
  if(count>=Z) st='red';
  else if(count>=Y) st='orange';
  else if(count>=X) st='yellow';
  const daysLeft = elapsed % T === 0 ? 0 : T - (elapsed % T);
  const nextNum = daysLeft;
  const ringProgress = Math.min(1, elapsed / T);
  const ringMarker = X > 0 ? Math.min(1, count / Math.max(1, Z || Y || X)) : null;
  return {st, faded, nextNum, ringProgress, ringMarker};
}
// Wet-garbage card: fixed weekly schedule (Mon+Thu collection, Sun+Wed remind)
function wetGarbageS(it,now){
  const last=new Date(it.lastDoneAt||0);
  const biweekly=!!(it&&it.biweekly);
  const horizon=biweekly?14:7;
  // Anchor: 2024-01-01 is a Monday, defined as start of an "on" week (week index 0).
  const ANCHOR=new Date(2024,0,1); ANCHOR.setHours(0,0,0,0);
  const isOnWeek=(date)=>{
    const d=new Date(date); d.setHours(0,0,0,0);
    const dow=d.getDay();
    const offsetToMon=(dow+6)%7; // days back to Monday
    const mon=new Date(d); mon.setDate(d.getDate()-offsetToMon);
    const weeksFromAnchor=Math.floor((mon-ANCHOR)/(86400000*7));
    return ((weeksFromAnchor%2)+2)%2===0;
  };
  const isCollectDay=(date)=>{
    const wd=date.getDay();
    if(wd!==1 && wd!==4) return false;
    return biweekly?isOnWeek(date):true;
  };
  const isRemindDay=(date)=>{
    const next=new Date(date); next.setDate(date.getDate()+1); next.setHours(0,0,0,0);
    return isCollectDay(next);
  };
  const today=new Date(now); today.setHours(0,0,0,0);
  // Days until next collection day
  let daysUntil=horizon;
  for(let d=0;d<horizon;d++){
    const t=new Date(today); t.setDate(today.getDate()+d);
    if(isCollectDay(t)){ daysUntil=d; break; }
  }
  // Find the most recent remind day at-or-before today
  function prevRemindDay(fromDate){
    const d=new Date(fromDate);d.setHours(0,0,0,0);
    for(let i=0;i<horizon;i++){
      const t=new Date(d); t.setDate(d.getDate()-i);
      if(isRemindDay(t)) return t;
    }
    return d;
  }
  const cycleStart=prevRemindDay(now);
  const doneInCycle=last>=cycleStart;
  const isRemind=isRemindDay(today);
  const isCollect=isCollectDay(today);
  let st='green';
  if(doneInCycle){
    st='green';
  }else if(isCollect){
    st='red';
  }else if(isRemind){
    st='yellow';
  }else if(!doneInCycle && daysUntil===0){
    st='red';
  }else if(!doneInCycle){
    // Past a collection day in this cycle without completing → faded red
    const daysSinceRemind=dayD(now,cycleStart);
    let passedCollect=false;
    for(let i=1;i<=daysSinceRemind;i++){
      const t=new Date(cycleStart); t.setDate(cycleStart.getDate()+i);
      if(isCollectDay(t)){ passedCollect=true; break; }
    }
    st=passedCollect?'red':'green';
  }
  const faded=st==='red'&&!isCollect;
  const ringProgress=daysUntil===0?1:Math.min(1,1-daysUntil/horizon);
  return {st, faded, nextNum:daysUntil, ringProgress, doneInCycle};
}

function escH(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function linkifyText(s){
  const esc=escH(s||'');

  //   - whitespace, < > " '
  //   - common separators: ｜ | 、 ，  ， ；  ；
  //   - trailing punctuation handled below via stripping
  // event.stopPropagation prevents the link click from also firing the parent card's onClick
  return esc.replace(/(https?:\/\/[^\s<>"'｜|、，；　]+)/gi, raw => {
    // Strip common trailing punctuation that shouldn't be part of URL
    let m=raw, trail='';
    while(m.length && /[。．.,!?！？)）\]】>》"'»…」』]/.test(m.slice(-1))){
      trail = m.slice(-1) + trail;
      m = m.slice(0,-1);
    }
    if(!m) return raw;
    return '<a href="'+m+'" target="_blank" rel="noopener noreferrer" class="auto-link" onclick="event.stopPropagation()">'+m+'</a>'+trail;
  });
}

function sameD(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function weekS(d){const o=new Date(d);const w=o.getDay();o.setDate(o.getDate()-(w===0?6:w-1));o.setHours(0,0,0,0);return o}
function weekE(d){const o=weekS(d);o.setDate(o.getDate()+7);return o}
const DEFAULT_LOGICAL_DAY_START_HOUR=6;
function localDayKeyFromDate(d){
  if(!(d instanceof Date)||Number.isNaN(d.getTime())) return '';
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function calendarDayKey(input){const d=new Date(input);return localDayKeyFromDate(d)}
// Logical day: the calendar day of the most recent wake event at or before `at`.
// Wake events come from sleep logs (kind sleep/stayed_up, endAt) and from
// S.workspace.lastWakeAt (scratch marker set on transition to sleep_summary).
// Used for action attribution (logs, records, work sessions). Plans/countdowns
// continue to use natural calendar time.
function computeLogicalDay(at){
  const atDate=at instanceof Date?at:new Date(at||Date.now());
  if(isNaN(atDate))return calendarDayKey(new Date());
  let latest=null;
  const logs=(typeof S!=='undefined'&&S&&S.logs)?S.logs:[];
  logs.forEach(l=>{
    if(l&&l.panelId==='sleep'&&(l.kind==='sleep'||l.kind==='stayed_up')&&l.endAt){
      const w=new Date(l.endAt);
      if(!isNaN(w)&&w<=atDate&&(!latest||w>latest))latest=w;
    }
  });
  if(typeof S!=='undefined'&&S&&S.workspace&&S.workspace.lastWakeAt){
    const lw=new Date(S.workspace.lastWakeAt);
    if(!isNaN(lw)&&lw<=atDate&&(!latest||lw>latest))latest=lw;
  }
  // Fallback: if the latest wake event is more than ~30 hours behind `at`,
  // we treat the logical-day tracker as stale and revert to the natural
  // calendar day. This prevents records from piling onto the wake-day of
  // weeks/days ago when sleep tracking is paused.
  if(latest){
    const elapsed=atDate-latest;
    if(elapsed>30*3600*1000) return calendarDayKey(atDate);
    return calendarDayKey(latest);
  }
  return calendarDayKey(atDate);
}
function getActiveLogicalDay(){return computeLogicalDay(Date.now())}
// Display helper: append "(次日)" when the natural calendar day of `naturalAt`
// is strictly AFTER the given logical day (e.g. action at 02:30 on 04-12 that
// belongs to logical day 04-11).
function markNextDay(timeStr,naturalAt,logicalDay){
  if(!timeStr||!naturalAt||!logicalDay)return timeStr||'';
  const naturalDay=calendarDayKey(naturalAt);
  return naturalDay>logicalDay?timeStr+' (次日)':timeStr;
}
function currentActiveLogicalDayKey(){return calendarDayKey(new Date())}
function logicalDayStart(day){const d=new Date(day+'T00:00:00');return d}
function logicalDayEnd(day){const d=new Date(day+'T23:59:59');return d}
function buildHomeMetrics(){const today=getActiveLogicalDay();const sessMs=(S.workspace.workSessions||[]).filter(ws=>computeLogicalDay(ws.startAt||ws.endAt)===today).reduce((n,ws)=>n+(ws.durationMs||((ws.mins||0)*60000)),0);const extraMs=(S.workspace.workSummary?.todayMinutes||0)*60000;return{focusMs:sessMs+extraMs}}
function previousCalendarDayKey(day){const d=new Date(day+'T00:00:00');d.setDate(d.getDate()-1);return localDayKeyFromDate(d)}
function timeToInputValue(v){if(!v)return '';const d=new Date(v);return toL(d).slice(0,16)}
function h(tag,at,...ch){
  const e=document.createElement(tag);
  if(at)for(const[k,v]of Object.entries(at)){
    if(k==='cn')e.className=v;
    else if(k==='st'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='id')e.id=v;
    else if(typeof v==='boolean'){
      if(v)e.setAttribute(k,'');
      else if(k in e)e[k]=false;
    }
    else e.setAttribute(k,v);
  }
  for(const c of ch.flat(Infinity)){
    if(c==null||c===false)continue;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  }
  return e;
}

let tlDBPromise=null;
let persistTimer=null;
let tlHydrated=false;
const __dirty={items:false,tags:false,workspace:false,records:false,rtags:false,sleepFlow:false};
function openTLDB(){
  if(tlDBPromise) return tlDBPromise;
  tlDBPromise=new Promise((resolve,reject)=>{
    const req=indexedDB.open(TL_DB_NAME,TL_DB_VERSION);
    req.onupgradeneeded=()=>{
      const db=req.result;
      if(!db.objectStoreNames.contains(TL_STORE)) db.createObjectStore(TL_STORE);
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return tlDBPromise;
}
async function idbGet(key){
  try{
    const db=await openTLDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(TL_STORE,'readonly');
      const rq=tx.objectStore(TL_STORE).get(key);
      rq.onsuccess=()=>resolve(rq.result);
      rq.onerror=()=>reject(rq.error);
    });
  }catch{return null}
}

async function idbDel(key){
  const db=await openTLDB();
  const tx=db.transaction(TL_STORE,'readwrite');
  tx.objectStore(TL_STORE).delete(key);
  return new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=j});
}
async function idbSet(key,val){
  const db=await openTLDB();
  return await new Promise((resolve,reject)=>{
    const tx=db.transaction(TL_STORE,'readwrite');
    tx.objectStore(TL_STORE).put(val,key);
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  });
}

async function hydrateFromDB(){
  try{
    // Try split keys first
    let [items, tags, ws] = await Promise.all([
      idbGet(SK_ITEMS), idbGet(SK_TAGS), idbGet(SK_WS)
    ]);
    // Load records zones (now flat S.logs array)
    const [recs, rtags] = await Promise.all([
      idbGet(SK_RECORDS), idbGet(SK_RTAGS)
    ]);
    if(Array.isArray(recs)) S.logs=recs;
    else if(recs && typeof recs==='object' && !Array.isArray(recs)){
      // Migrate old keyed format {food:[...], drink:[...]} → flat array
      const flat=[];
      Object.keys(recs).forEach(pid=>{
        if(Array.isArray(recs[pid])) recs[pid].forEach(r=>flat.push({...r,panelId:pid}));
      });
      S.logs=flat;
    }
    if(rtags && typeof rtags==='object') S.rtags=rtags;
    try{const sf=await idbGet('tl_sleepflow');if(sf&&sf.phase)S.sleepFlow=sf}catch(e){console.warn('hydrate sleepFlow failed',e)}

    const hasSplit = !!(items || tags || ws);

    // Legacy fallback: monolithic SK key in IDB (no localStorage)
    if(!hasSplit){
      const sv=await idbGet(SK);
      if(sv){
        items = sv.items || null;
        tags = sv.tags || null;
        ws = sv.workspace || null;
        // Write split keys for future loads
        const mig=[];
        if(items) mig.push(idbSet(SK_ITEMS,items).catch(()=>{}));
        if(tags) mig.push(idbSet(SK_TAGS,tags).catch(()=>{}));
        if(ws) mig.push(idbSet(SK_WS,ws).catch(()=>{}));
        if(mig.length) await Promise.all(mig);
      }
    }

    if(items&&typeof items==='object') S.items=items;
    if(tags&&typeof tags==='object') S.tags={...S.tags,...tags};
    if(ws&&typeof ws==='object'){
      const restoredWorkspace={...ws};
      delete restoredWorkspace.workMode;
      delete restoredWorkspace._workModeResume;
      // Trend chart filters are session-only — always start fresh.
      delete restoredWorkspace.trendView;
      S.workspace={...S.workspace,...restoredWorkspace};
      if(!S.workspace.files) S.workspace.files={};
      if(!Array.isArray(S.workspace.plans)) S.workspace.plans=[];
      if(!Array.isArray(S.workspace.quickFileIds)) S.workspace.quickFileIds=[];
      if(!Array.isArray(S.workspace.workSessions)) S.workspace.workSessions=[];
      if(!S.workspace.planNotebook||typeof S.workspace.planNotebook!=='object') S.workspace.planNotebook={};
    }
    ensureDefaultMoodPalette();

    const stars=await idbGet('tl_sleep_stars');
    const pageState=await idbGet('tl_page_state');
    if(pageState){
      window.__TL_PAGE_STATE__=pageState;
      if(pageState.mainView) S.mainView=pageState.mainView;
      if(pageState.workMode){
        S.mainView='home';
        const restoredMs=pageState.workMode.minimalState||{};
        // Page close counts as one interrupt — increment here on recovery
        restoredMs.interruptCount=Number(restoredMs.interruptCount||0)+1;
        S.workspace.workMode={fileId:pageState.workMode.fileId,_sessionStartedAt:pageState.workMode._sessionStartedAt||null,minimalState:restoredMs};
        S.workspace._workModeResume=true;
      }
    }
    // ── Seed protected system cards ──
    // The self-cook card ('洗碗-灶台清潔') is a permanent system reminder tied
    // to the food-log '自炊' mode. It lives in kitchen, archived by default,
    // and auto-unarchives with a fresh 2-day countdown whenever the user logs
    // a 自炊 meal. This seed ensures it always exists — on first run, after
    // delete-all, or after any state wipe. Matching uses id + protected marker
    // + name fallback so it won't duplicate across reinstalls/migrations.
    try{
      if(!Array.isArray(S.items.kitchen)) S.items.kitchen=[];
      const isSelfCook=it=>it&&(
        it.id==='l-default-selfcook'||
        (it.protected===true&&it.defaultRestore==='selfCookMeal')||
        (typeof it.name==='string'&&it.name.indexOf('洗碗-灶台')>=0)
      );
      const existing=S.items.kitchen.find(isSelfCook);
      let needsSave=false;
      if(!existing){
        S.items.kitchen.unshift({
          id:'l-default-selfcook',
          type:'expiry',
          name:'洗碗-灶台清潔',
          image:DEMO,
          protected:true,
          defaultRestore:'selfCookMeal',
          unit:'次',
          expiryType:'days',
          expiryDays:2,
          archived:true,
          purchasedAt:null,
          expiryDate:null,
          warningDate:null
        });
        needsSave=true;
      }else{
        // Migrate legacy card: strip totalQty/usedQty so it uses the
        // complete-button branch instead of the +1 quantity branch,
        // and ensure protected/defaultRestore markers are set.
        if('totalQty' in existing||'usedQty' in existing||!existing.protected||existing.defaultRestore!=='selfCookMeal'){
          delete existing.totalQty;
          delete existing.usedQty;
          existing.protected=true;
          existing.defaultRestore='selfCookMeal';
          needsSave=true;
        }
      }
      // ── Seed wet-garbage card ──
      if(!Array.isArray(S.items.garbage)) S.items.garbage=[];
      const isWetGarbage=it=>it&&(
        it.id==='l-default-wetgarbage'||
        (it.protected===true&&it.type==='wetGarbage'&&!it.defaultRestore)
      );
      const existingWG=S.items.garbage.find(isWetGarbage);
      if(!existingWG){
        S.items.garbage.unshift({
          id:'l-default-wetgarbage',
          type:'wetGarbage',
          name:'濕垃圾',
          image:DEMO,
          protected:true,
          lastDoneAt:new Date(0).toISOString(),
          archived:false
        });
        needsSave=true;
      }else{
        let wgDirty=false;
        if(!existingWG.protected){existingWG.protected=true;wgDirty=true}
        if(existingWG.type!=='wetGarbage'){existingWG.type='wetGarbage';wgDirty=true}
        if(!existingWG.lastDoneAt){existingWG.lastDoneAt=new Date(0).toISOString();wgDirty=true}
        if(existingWG.archived){existingWG.archived=false;wgDirty=true}
        if(wgDirty) needsSave=true;
      }
      // ── Seed kitchen-drain cards (廚房水兜 weekly + 浴室水兜 biweekly) ──
      if(!Array.isArray(S.items.kitchen)) S.items.kitchen=[];
      const kitchenSeeds=[
        {id:'l-default-kitchen-drain',name:'更換廚房水兜',biweekly:false,defaultRestore:'kitchenDrain'},
        {id:'l-default-bathroom-drain',name:'更換浴室水兜',biweekly:true,defaultRestore:'bathroomDrain'}
      ];
      kitchenSeeds.forEach(seed=>{
        const existing=S.items.kitchen.find(it=>it&&(it.id===seed.id||(it.protected===true&&it.defaultRestore===seed.defaultRestore)));
        if(!existing){
          S.items.kitchen.unshift({
            id:seed.id,
            type:'wetGarbage',
            name:seed.name,
            image:DEMO,
            protected:true,
            defaultRestore:seed.defaultRestore,
            biweekly:seed.biweekly,
            lastDoneAt:new Date(0).toISOString(),
            archived:false
          });
          needsSave=true;
        }else{
          let dirty=false;
          if(!existing.protected){existing.protected=true;dirty=true}
          if(existing.type!=='wetGarbage'){existing.type='wetGarbage';dirty=true}
          if(existing.defaultRestore!==seed.defaultRestore){existing.defaultRestore=seed.defaultRestore;dirty=true}
          if(existing.biweekly!==seed.biweekly){existing.biweekly=seed.biweekly;dirty=true}
          if(!existing.lastDoneAt){existing.lastDoneAt=new Date(0).toISOString();dirty=true}
          if(existing.archived){existing.archived=false;dirty=true}
          if(dirty) needsSave=true;
        }
      });
      if(needsSave){
        try{ await idbSet(SK_ITEMS,S.items); }catch{}
      }
    }catch(err){ console.warn('seed protected cards failed',err); }
  }catch(err){ console.warn('hydrateFromDB failed:',err); }
  tlHydrated=true;
}

function mkRing(p,st,opts={}){
  const r=13,c=2*Math.PI*r,d=c*Math.max(0,Math.min(1,p));
  const faded=opts.faded?0.32:0.88;
  const marker=typeof opts.marker==='number'?Math.max(0,Math.min(1,opts.marker)):null;
  const cl={green:`rgba(104,168,120,${faded})`,yellow:`rgba(194,162,74,${faded})`,orange:`rgba(204,126,78,${faded})`,red:`rgba(192,88,88,${faded})`};
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 32 32');
  svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)';
  let markerMarkup='';
  if(marker!==null){
    const a=(-90 + marker*360) * Math.PI / 180;
    const cx=16 + r*Math.cos(a), cy=16 + r*Math.sin(a);
    markerMarkup=`<circle cx="${cx.toFixed(2)}" cy="${cy.toFixed(2)}" r="1.6" fill="rgba(120,110,104,.58)"/>`;
  }
  svg.innerHTML=`<circle cx="16" cy="16" r="${r}" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="1.8"/><circle cx="16" cy="16" r="${r}" fill="none" stroke="${cl[st]||cl.green}" stroke-width="2" stroke-linecap="round" stroke-dasharray="${d} ${c-d}"/>${markerMarkup}`;
  return svg;
}


// ── Category data management helpers ──
// Four categories: flipnote (cards), worktime (sessions/projects/plans),
// life (logs/tags/rtags/sleepFlow), files (folders/files)
// B/8: Restructured to 2 categories:
//   life  = flipnote items + logs/tags/sleepFlow + daily plans + calendar events
//   work  = projects + work sessions + files/folders + (work-related state)
function extractCategoryData(cat){
  if(cat==='life') return {
    items:S.items,
    logs:S.logs||[],
    tags:S.tags||{},
    rtags:S.rtags||{},
    sleepFlow:S.sleepFlow||{},
    workspace:{
      lastWakeAt:S.workspace.lastWakeAt||null,
      plans:S.workspace.plans||[],
      planDay:S.workspace.planDay||null,
      planNotebook:S.workspace.planNotebook||{},
      calendarEvents:S.workspace.calendarEvents||[]
    }
  };
  if(cat==='work') return { workspace:{
    projects:S.workspace.projects||[],
    selectedProjectId:S.workspace.selectedProjectId||null,
    selectedChildId:S.workspace.selectedChildId||null,
    timelineScale:S.workspace.timelineScale||'month',
    timelineOffset:S.workspace.timelineOffset||0,
    workSessions:S.workspace.workSessions||[],
    moodPalette:S.workspace.moodPalette||[],
    folders:S.workspace.folders||[],
    files:S.workspace.files||{},
    quickFileIds:S.workspace.quickFileIds||[],
    quickFolderId:S.workspace.quickFolderId||null
  }};
  return null;
}
function mergeCategoryData(cat,data){
  if(!data) return;
  if(cat==='life'){
    if(data.items) S.items=data.items;
    if(data.logs) S.logs=data.logs;
    if(data.tags) S.tags=data.tags;
    if(data.rtags) S.rtags=data.rtags;
    if(data.sleepFlow) S.sleepFlow=data.sleepFlow;
    if(data.workspace){
      if(data.workspace.lastWakeAt!==undefined) S.workspace.lastWakeAt=data.workspace.lastWakeAt;
      if(data.workspace.plans) S.workspace.plans=data.workspace.plans;
      if(data.workspace.planDay!==undefined) S.workspace.planDay=data.workspace.planDay;
      if(data.workspace.planNotebook) S.workspace.planNotebook=data.workspace.planNotebook;
      if(data.workspace.calendarEvents) S.workspace.calendarEvents=data.workspace.calendarEvents;
    }
  }else if(cat==='work'){
    if(data.workspace) Object.assign(S.workspace,data.workspace);
  }
}
function clearCategoryData(cat){
  if(cat==='life'){
    // Preserve protected cards (洗碗-灶台清潔, 濕垃圾)
    const protectedItems={};
    ['fresh','pantry','kitchen','living','garbage'].forEach(c=>{
      const list=((S.items&&S.items[c])||[]).filter(it=>it&&it.protected===true);
      if(list.length){
        protectedItems[c]=list.map(it=>({
          id:it.id,type:it.type,name:it.name,image:it.image,
          protected:true,defaultRestore:it.defaultRestore,
          biweekly:it.biweekly||false,
          unit:it.unit,expiryType:it.expiryType,expiryDays:it.expiryDays,
          cycleX:it.cycleX,cycleDays:it.cycleDays,remindY:it.remindY,
          warnZ:it.warnZ,limitX:it.limitX,periodUnit:it.periodUnit,
          totalQty:it.totalQty,
          archived: it.type==='wetGarbage' ? false : true,
          usedQty:0,count:0,xReachedAt:null,
          lastDoneAt: it.type==='wetGarbage' ? new Date(0).toISOString() : null,
          purchasedAt:null,expiryDate:null,warningDate:null
        }));
      }
    });
    S.items={fresh:[],pantry:[],kitchen:[],living:[],garbage:[]};
    Object.keys(protectedItems).forEach(c=>{ S.items[c]=protectedItems[c]; });
    S.logs=[];
    S.tags={};
    S.rtags={};
    S.sleepFlow={phase:null,sleepStartAt:null,napStartAt:null,morningExpanded:null,morningCompleted:{}};
    S.workspace.lastWakeAt=null;
    S.workspace.plans=[];
    S.workspace.planDay=null;
    S.workspace.planNotebook={};
    S.workspace.calendarEvents=[];
  }else if(cat==='work'){
    S.workspace.projects=[];
    S.workspace.selectedProjectId=null;
    S.workspace.selectedChildId=null;
    S.workspace.timelineOffset=0;
    S.workspace.workSessions=[];
    S.workspace.folders=[];
    S.workspace.files={};
    S.workspace.quickFileIds=[];
    S.workspace.quickFolderId=null;
  }
}

function downloadCategoryJSON(cat){
  const data=extractCategoryData(cat);

  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const d=new Date();
  const ymd=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const a=document.createElement('a');

            id:it.id,
            type:it.type,
            name:it.name,
            image:it.image,
            protected:true,
            defaultRestore:it.defaultRestore,
            biweekly:it.biweekly||false,
            // Preserve static config
            unit:it.unit,
            expiryType:it.expiryType,
            expiryDays:it.expiryDays,
            cycleX:it.cycleX,
            cycleDays:it.cycleDays,
            remindY:it.remindY,
            warnZ:it.warnZ,
            limitX:it.limitX,
            periodUnit:it.periodUnit,
            totalQty:it.totalQty,
            // Reset runtime state — wetGarbage stays visible (not archived)
            archived: it.type==='wetGarbage' ? false : true,
            usedQty:0,
            count:0,
            xReachedAt:null,
            lastDoneAt: it.type==='wetGarbage' ? new Date(0).toISOString() : null,
            purchasedAt:null,
            expiryDate:null,
            warningDate:null
          }));
        }
      });
    }catch{}
    // ── Step 1: disable ALL save paths so nothing can write to IDB after this point ──
    // queuePersist() and flushSaveNow() both short-circuit when !tlHydrated.
    try{tlHydrated=false;}catch{}
    try{clearTimeout(persistTimer);__savePending=false;}catch{}
    // Remove unload handlers so beforeunload on reload can't fire flushSaveNow
    try{
      if(window.__tlSavePageStateHandler){
        window.removeEventListener('beforeunload',window.__tlSavePageStateHandler);
        window.removeEventListener('pagehide',window.__tlSavePageStateHandler);
      }
    }catch{}
    // ── Step 2: wait for any in-flight saveAll in the chain to settle ──
    // This is the critical race fix: an saveAll() that started BEFORE the click
    // captured the old S by reference in the idbSet(val=...) call, so it will
    // write stale data even if we reset S afterwards. Awaiting the chain makes
    // those writes land FIRST, then our IDB wipe below overwrites them.
    try{await __saveChain;}catch{}
    // ── Step 3: neutralize dirty flags + blank in-memory state as belt-and-braces ──
    try{__dirty.items=false;__dirty.tags=false;__dirty.workspace=false;__dirty.records=false;__dirty.rtags=false;__dirty.sleepFlow=false;}catch{}
    try{
      S.items={fresh:[],pantry:[],kitchen:[],living:[],garbage:[]};
      S.tags={};
      S.logs=[];
      S.rtags={};
      S.workspace={projects:[],folders:[],files:{},plans:[],workSessions:[],planNotebook:{}};
      S.sleepFlow={phase:null,sleepStartAt:null,napStartAt:null,morningExpanded:null,morningCompleted:{}};
    }catch{}
    // ── Step 4: delete the entire IndexedDB database (nuclear option) ──
    // Critical: must reset tlDBPromise cache so subsequent openTLDB() calls
    // create a FRESH connection. Otherwise deleteDatabase blocks (cached
    // promise still counts as an open handle) and all post-delete writes
    // hit a closed db instance and silently throw InvalidStateError.
    try{
      // 1. Close the cached connection if any
      try{
        if(tlDBPromise){
          const db=await tlDBPromise;
          try{db.close();}catch{}
        }
      }catch{}
      // 2. Clear the cache — this is the fix
      tlDBPromise=null;
      // 3. Delete the database by name
      await new Promise((resolve)=>{
        const req=indexedDB.deleteDatabase(TL_DB_NAME);
        let done=false;
        const finish=()=>{if(!done){done=true;resolve();}};
        req.onsuccess=finish;
        req.onerror=finish;
        req.onblocked=finish;
        setTimeout(finish,3000);
      });
      // 4. Ensure cache is still null after the delete promise resolves
      tlDBPromise=null;
    }catch{}
    // Fallback: if deleteDatabase didn't work, at least clear the store on
    // a freshly-opened connection
    try{
      tlDBPromise=null;
      const db=await openTLDB();
      const tx=db.transaction(TL_STORE,'readwrite');
      tx.objectStore(TL_STORE).clear();
      await new Promise(r=>{tx.oncomplete=r;tx.onerror=r;tx.onabort=r});
    }catch{}
    // ── Step 5: re-inject protected cards into fresh DB ──
    // Write directly to IDB (not via saveAll, which is disabled).
    if(Object.keys(protectedItems).length){
      try{
        const freshItems={fresh:[],pantry:[],kitchen:[],living:[],garbage:[]};
        Object.keys(protectedItems).forEach(cat=>{freshItems[cat]=protectedItems[cat]});
        const db=await openTLDB();
        await new Promise(r=>{
          const tx=db.transaction(TL_STORE,'readwrite');
          tx.objectStore(TL_STORE).put(freshItems,SK_ITEMS);
          tx.oncomplete=r;
          tx.onerror=r;
          tx.onabort=r;
        });
      }catch{}
    }
    // ── Step 6: hard reload ──
    location.reload();
  }})},'刪除所有數據'));
  wrap.appendChild(acts);

  const catSection=h('div',{st:{marginTop:'24px',paddingTop:'20px',borderTop:'1px solid var(--border)'}});

// Deterministic color per tag — avoids the purple, green, and red hue ranges.
// Returns null for empty tags so the caller can skip rendering.
// An optional seed override in S.workspace.childTagColors[tag] lets the user
// re-roll a tag's color from the tag manager without renaming it.
function childTagColor(tag){
  if(!tag) return null;
  const t=String(tag);
  const overrides=(S.workspace&&S.workspace.childTagColors)||{};
  let hash;
  if(overrides[t]!=null){ hash=overrides[t]|0; }
  else {
    hash=0;
    for(let i=0;i<t.length;i++){
      hash=((hash<<5)-hash)+t.charCodeAt(i);
      hash|=0;
    }
  }
  // Allowed hue ranges: yellow-orange (30-90), cyan-blue (180-240), pink-magenta (300-330)
  // (skips red 0-30/330-360, green 90-180, purple 240-300)
  const allowed=[[30,90],[180,240],[300,330]];
  const total=allowed.reduce((s,[a,b])=>s+(b-a),0);
  let pos=Math.abs(hash)%total;
  let hue=allowed[0][0];
  for(const [lo,hi] of allowed){
    if(pos<hi-lo){ hue=lo+pos; break; }
    pos-=(hi-lo);
  }
  return {bg:`hsl(${hue},58%,82%)`,border:`hsl(${hue},48%,62%)`,text:`hsl(${hue},42%,28%)`};
}
// Stamp a random seed for `tag` and persist so the new color survives.
function childTagRecolor(tag){
  if(!tag) return;
  if(!S.workspace.childTagColors||typeof S.workspace.childTagColors!=='object') S.workspace.childTagColors={};
  S.workspace.childTagColors[tag]=Math.floor(Math.random()*2147483647);
  wsSave();
}
// Rename every child with `oldTag` to `newTag` (preserves color override if any).
function childTagRename(oldTag,newTag){
  oldTag=String(oldTag||'').trim();
  newTag=String(newTag||'').trim();
  if(!oldTag||!newTag||oldTag===newTag) return;
  (S.workspace.projects||[]).forEach(p=>(p.children||[]).forEach(c=>{
    if((c.tag||'')===oldTag) c.tag=newTag;
  }));
  if(S.workspace.childTagColors && oldTag in S.workspace.childTagColors){
    const seed=S.workspace.childTagColors[oldTag];
    delete S.workspace.childTagColors[oldTag];
    S.workspace.childTagColors[newTag]=seed;
  }
  if(Array.isArray(S.workspace.childTagBank)){
    S.workspace.childTagBank=S.workspace.childTagBank.map(t=>t===oldTag?newTag:t).filter((t,i,a)=>a.indexOf(t)===i);
  }
  wsSave();
}

function childTagDelete(tag){

  if(!tag) return;
  (S.workspace.projects||[]).forEach(p=>(p.children||[]).forEach(c=>{
    if((c.tag||'')===tag) c.tag='';
  }));
  if(S.workspace.childTagColors && tag in S.workspace.childTagColors){
    delete S.workspace.childTagColors[tag];
  }
  if(Array.isArray(S.workspace.childTagBank)){
    S.workspace.childTagBank=S.workspace.childTagBank.filter(t=>t!==tag);
  }
  wsSave();
}

// Trend chart viewer (placeholder card → 趨勢圖)
// Page 0 = 睡眠 (入睡/醒來/起床 + 睡眠/賴床時長)
// ─────────────────────────────────────────────────────────────
function trendEnumerateDays(fromKey,toKey){
  const out=[];
  const start=new Date(fromKey+'T00:00:00');
  const end=new Date(toKey+'T00:00:00');
  if(isNaN(start)||isNaN(end)||start>end) return out;
  const d=new Date(start);
  while(d<=end){ out.push(calendarDayKey(d)); d.setDate(d.getDate()+1); }
  return out;
}
// Bucket-aggregate daily sleep data per the dropdown.
// Buckets count BACKWARDS from the last day in fixed-size day windows:
//   按週 = 7d, 按十日 = 10d, 按月 = 30d, 按三月 = 90d.
// Each bucket's value = average (time values rounded to nearest minute).
function trendBucketize(dailyData,bucketMode){
  if(!bucketMode||bucketMode==='day') return dailyData;
  const SIZE={week:7,ten:10,month:30,quarter:90}[bucketMode];
  if(!SIZE||!dailyData.length) return dailyData;
  // Walk from last index backwards in chunks of SIZE so the most recent day
  // anchors bucket 0, the previous SIZE days anchor bucket 1, etc. The first
  // (oldest) bucket may be smaller if the range isn't a multiple of SIZE.
  const buckets=[];
  for(let i=dailyData.length-1; i>=0; ){
    const chunk=[];
    for(let k=0;k<SIZE&&i>=0;k++,i--) chunk.unshift(dailyData[i]);
    if(chunk.length) buckets.unshift(chunk);
  }
  return buckets.map(items=>{
    const repDate=items[items.length-1].date;
    const repAnchor=new Date(repDate+'T15:00:00'); repAnchor.setDate(repAnchor.getDate()-1);
    // Average each time series (入睡/醒來/起床) across the bucket's days,
    // measured in hours-since-each-day's-anchor, rounded to the nearest
    // minute, then re-projected on the rep day's anchor. The duration
    // series (睡眠 / 賴床) are DERIVED from these averaged times rather
    // than averaged independently, so the fill bands stay visually
    // consistent with the line positions.
    const meanHours=(key)=>{
      const hrs=[];
      items.forEach(it=>{
        if(!it[key]) return;
        const v=new Date(it[key]); if(isNaN(v)) return;
        const a=new Date(it.date+'T15:00:00'); a.setDate(a.getDate()-1);
        hrs.push((v-a)/3600000);
      });
      if(!hrs.length) return null;
      return hrs.reduce((s,x)=>s+x,0)/hrs.length;
    };
    const isoFromMeanHours=(meanH)=>{
      if(meanH==null) return null;
      const minutes=Math.round(meanH*60);
      return new Date(repAnchor.getTime()+minutes*60000).toISOString();
    };
    const mhSleep=meanHours('sleep');
    const mhWake=meanHours('wake');
    const mhGetup=meanHours('getup');
    const sleepIso=isoFromMeanHours(mhSleep);
    const wakeIso=isoFromMeanHours(mhWake);
    const getupIso=isoFromMeanHours(mhGetup);
    // Recompute durations from the ROUNDED averaged times so the values in
    // tooltips / fill bands match the visible lines.
    const hoursBetween=(a,b)=>{
      if(!a||!b) return null;
      const diff=(new Date(b)-new Date(a))/3600000;
      return diff>0?diff:null;
    };
    return {
      date:repDate,
      sleep:sleepIso,
      wake:wakeIso,
      getup:getupIso,
      sleepHours:hoursBetween(sleepIso,wakeIso),
      lazyHours:hoursBetween(wakeIso,getupIso),
      stayedUp:false
    };
  });
}
// Returns { points, dayBucketIdx, daily }:
//   points       — possibly-aggregated points (one per bucket if bucketing)
//   dayBucketIdx — array same length as daily mapping each day to its
//                  position index in `points`
//   daily        — the raw per-day series (used for run detection)
function trendGetSleepData(fromKey,toKey,bucketMode){
  const daily=_trendGetSleepDataDaily(fromKey,toKey);
  if(!bucketMode||bucketMode==='day') return {points:daily,dayBucketIdx:daily.map((_,i)=>i),daily};
  const SIZE={week:7,ten:10,month:30,quarter:90}[bucketMode];
  if(!SIZE||!daily.length) return {points:daily,dayBucketIdx:daily.map((_,i)=>i),daily};
  // Walk backwards from the last day in fixed `SIZE`-day windows.
  const indexBuckets=[];
  for(let i=daily.length-1;i>=0;){
    const idxs=[];
    for(let k=0;k<SIZE&&i>=0;k++,i--) idxs.unshift(i);
    if(idxs.length) indexBuckets.unshift(idxs);
  }
  const dayBucketIdx=new Array(daily.length);
  indexBuckets.forEach((idxs,bIdx)=>{ idxs.forEach(d=>{ dayBucketIdx[d]=bIdx; }); });
  // Aggregate each bucket: average times (rounded to minute), derive durations.
  const points=indexBuckets.map(idxs=>{
    const items=idxs.map(j=>daily[j]);
    const repDate=items[items.length-1].date;
    const repAnchor=new Date(repDate+'T15:00:00'); repAnchor.setDate(repAnchor.getDate()-1);
    const meanHours=(key)=>{
      const hrs=[];
      items.forEach(it=>{
        if(!it[key]) return;
        const v=new Date(it[key]); if(isNaN(v)) return;
        const a=new Date(it.date+'T15:00:00'); a.setDate(a.getDate()-1);
        hrs.push((v-a)/3600000);
      });
      if(!hrs.length) return null;
      return hrs.reduce((s,x)=>s+x,0)/hrs.length;
    };
    const isoFromMeanHours=(meanH)=>{
      if(meanH==null) return null;
      const minutes=Math.round(meanH*60);
      return new Date(repAnchor.getTime()+minutes*60000).toISOString();
    };
    const sleepIso=isoFromMeanHours(meanHours('sleep'));
    const wakeIso=isoFromMeanHours(meanHours('wake'));
    const getupIso=isoFromMeanHours(meanHours('getup'));
    const hoursBetween=(a,b)=>{
      if(!a||!b) return null;
      const diff=(new Date(b)-new Date(a))/3600000;
      return diff>0?diff:null;
    };
    return {
      date:repDate,
      sleep:sleepIso,
      wake:wakeIso,
      getup:getupIso,
      sleepHours:hoursBetween(sleepIso,wakeIso),
      lazyHours:hoursBetween(wakeIso,getupIso),
      stayedUp:false
    };
  });
  return {points,dayBucketIdx,daily};
}
function _trendGetSleepDataDaily(fromKey,toKey){
  const days=trendEnumerateDays(fromKey,toKey);
  const sleepLogs=(S.logs||[]).filter(l=>l&&l.panelId==='sleep'&&(l.kind==='sleep'||l.kind==='stayed_up'));
  const lazyLogs=(S.logs||[]).filter(l=>l&&l.panelId==='sleep'&&l.kind==='lazy');
  return days.map(day=>{
    let bestSleep=null,bestSleepT=-Infinity;
    sleepLogs.forEach(l=>{
      if(!l.endAt)return;
      const ed=new Date(l.endAt); if(isNaN(ed))return;
      if(calendarDayKey(ed)!==day)return;
      const t=ed.getTime(); if(t>bestSleepT){ bestSleep=l; bestSleepT=t; }
    });
    let bestLazy=null,bestLazyT=-Infinity;
    lazyLogs.forEach(l=>{
      const ref=l.endAt||l.executiveTime; if(!ref)return;
      const ed=new Date(ref); if(isNaN(ed))return;
      if(calendarDayKey(ed)!==day)return;
      const t=ed.getTime(); if(t>bestLazyT){ bestLazy=l; bestLazyT=t; }
    });
    const p={date:day,sleep:null,wake:null,getup:null,sleepHours:null,lazyHours:null,stayedUp:false};
    if(bestSleep){
      if(bestSleep.kind==='stayed_up'){
        p.sleep=bestSleep.endAt; p.wake=bestSleep.endAt; p.stayedUp=true; p.sleepHours=0;
      } else {
        p.sleep=bestSleep.startAt; p.wake=bestSleep.endAt;
        if(bestSleep.startAt&&bestSleep.endAt){
          const dur=(new Date(bestSleep.endAt)-new Date(bestSleep.startAt))/3600000;
          if(dur>0) p.sleepHours=dur;
        }
      }
    }
    if(bestLazy){
      p.getup=bestLazy.endAt||null;
      if(bestLazy.startAt&&bestLazy.endAt){
        const dur=(new Date(bestLazy.endAt)-new Date(bestLazy.startAt))/3600000;
        if(dur>0) p.lazyHours=dur;
      }
    }
    return p;
  });
}
// Position 0..1 within the full 24h band (prev-day 15:00 → next-day 15:00).
// Values outside [0,1] indicate "out of band".
function trendTimeY(iso,dayKey){
  if(!iso) return null;
  const d=new Date(iso); if(isNaN(d)) return null;
  const anchor=new Date(dayKey+'T15:00:00'); anchor.setDate(anchor.getDate()-1);
  const hoursFrom=(d-anchor)/3600000;
  return hoursFrom/24;
}
function trendDetectRuns(arr,pred,minLen){
  const runs=[]; let s=-1;
  for(let i=0;i<=arr.length;i++){
    const ok=i<arr.length?pred(arr[i],i):false;
    if(ok&&s<0) s=i;
    if(!ok&&s>=0){ if((i-1)-s+1>=minLen) runs.push({a:s,b:i-1}); s=-1; }
  }
  return runs;
}
function trendDrawPolyline(svg,pts,color){

  el.setAttribute('stroke-width','1');

// Smooth curve through points using Catmull-Rom → cubic Bezier conversion.
// Falls back to a polyline when there are fewer than 3 points.
function trendDrawSmoothLine(svg,pts,color){
  if(pts.length<2) return;
  if(pts.length===2){ trendDrawPolyline(svg,pts,color); return; }
  const NS='http://www.w3.org/2000/svg';
  const path=document.createElementNS(NS,'path');
  const tension=0.18; // 0 = sharper, 0.5 = looser
  let d='M '+pts[0].x+','+pts[0].y;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i];
    const p1=pts[i];
    const p2=pts[i+1];
    const p3=pts[i+2]||pts[i+1];
    const cp1x=p1.x+(p2.x-p0.x)*tension;
    const cp1y=p1.y+(p2.y-p0.y)*tension;
    const cp2x=p2.x-(p3.x-p1.x)*tension;
    const cp2y=p2.y-(p3.y-p1.y)*tension;
    d+=' C '+cp1x+','+cp1y+' '+cp2x+','+cp2y+' '+p2.x+','+p2.y;
  }
  path.setAttribute('d',d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',color);
  path.setAttribute('stroke-width','1');
  path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-linejoin','round');
  path.setAttribute('vector-effect','non-scaling-stroke');
  svg.appendChild(path);
}
function trendDrawBandSegment(svg,pts,fill){

  el.setAttribute('fill',fill);

function trendSleepTimeChart(input,opts){
  // Accept either the legacy raw daily array OR the new {points, dayBucketIdx, daily} bundle.
  const data=Array.isArray(input)?input:(input&&input.points)||[];
  const daily=Array.isArray(input)?input:(input&&input.daily)||data;
  const dayBucketIdx=(input&&input.dayBucketIdx)||data.map((_,i)=>i);
  const fit=!!(opts&&opts.fit);
  const crop=!!(opts&&opts.crop);
  // ── Compute crop window when requested: tight to the data's t-range
  //    (positions in the full 24h band 0..1) plus a small padding above
  //    and below. Used to render only the "interesting" slice on the modal
  //    big view and on the export image.
  let viewMinT=0, viewMaxT=1; // default = full 24h band
  if(crop){
    let dMin=Infinity, dMax=-Infinity;
    ['sleep','wake','getup'].forEach(key=>{
      data.forEach(d=>{
        const t=trendTimeY(d[key],d.date);
        if(t==null) return;
        if(t<dMin) dMin=t;
        if(t>dMax) dMax=t;
      });
    });

        const c=(viewMinT+viewMaxT)/2;

      }
    }
  }

  // min-height guarantees a non-zero box on mobile (where the flex chain may

  const wrap=h('div',{st:{flex:'1 1 0',position:'relative',minHeight:'220px',background:'rgba(255,255,255,0.32)',border:'1px solid var(--border2)',borderRadius:'10px',overflow:'hidden'}});
  const N=data.length;
  if(!N){ wrap.appendChild(h('div',{st:{fontSize:'10.5px',color:'var(--text4)',textAlign:'center',padding:'14px'}},'無數據')); return wrap; }
  const scroller=h('div',{cn:'trend-scroller',st:{position:'absolute',inset:'0',overflow:'auto'}});
  wrap.appendChild(scroller);
  // Floating tooltip (positioned in the wrap so it overlays the scroller content)
  const tooltip=h('div',{cn:'trend-tooltip'});
  wrap.appendChild(tooltip);

  const fmtTimeHM=(iso)=>{

    const d=new Date(iso); if(isNaN(d)) return '—';

      const baseInner=N===1?60:(N-1)*MIN_GAP;
      const fitInner=Math.max(0,vw-PAD_L-PAD_R);
      innerW=Math.max(baseInner,fitInner);
      svgW=PAD_L+PAD_R+innerW;

    svg.setAttribute('height',String(svgH));
    svg.setAttribute('viewBox','0 0 '+svgW+' '+svgH);

    // ── Red warning shading — severity scales with the number of simultaneously

    //   3) sleep timestamp ≥ 03:00 (and < 12:00) on dayKey for 3+ consecutive days
    const dayViolations=new Array(daily.length).fill(0);
    const markRun=runs=>{ runs.forEach(({a,b})=>{ for(let d=a; d<=b; d++) dayViolations[d]++; }); };
    markRun(trendDetectRuns(daily,d=>d.sleepHours!=null&&d.sleepHours<5,3));
    markRun(trendDetectRuns(daily,d=>d.lazyHours!=null&&d.lazyHours>3,3));
    markRun(trendDetectRuns(daily,d=>{
      if(!d.sleep)return false;

    dayViolations.forEach((cnt,dIdx)=>{

      {key:'wake', color:'rgba(86,144,199,0.92)',name:'醒來'},
      {key:'getup',color:'rgba(204,162,74,0.92)',name:'起床'}

    series.forEach(s=>{

      });
    });
    // ── Discrete area columns ────────────────────────────────────────
    // Instead of one continuous filled band between two series, draw a
    // rounded rectangle around each data point spanning ~60% of its cell.
    // Each column contains the duration text in the centre — a tidy
    // "integration interval" look while leaving small gaps between cells.
    const fmtHours=hrs=>{
      if(hrs==null||!isFinite(hrs)||hrs<=0) return '';
      const totalMin=Math.round(hrs*60);
      const H=Math.floor(totalMin/60), M=totalMin%60;
      return H+'h'+(M?String(M).padStart(2,'0'):'');
    };
    const colW=Math.max(6,cellW*0.6);
    const drawColumn=(upper,lower,fillColor,labelHours,labelColor)=>{
      if(!upper||!lower) return;
      const yTop=Math.min(upper.y,lower.y);
      const yBot=Math.max(upper.y,lower.y);
      const x=upper.x-colW/2;
      const rect=document.createElementNS(NS,'rect');
      rect.setAttribute('x',x);
      rect.setAttribute('y',yTop);
      rect.setAttribute('width',colW);
      rect.setAttribute('height',Math.max(2,yBot-yTop));
      rect.setAttribute('fill',fillColor);

        const txt=document.createElementNS(NS,'text');
        txt.setAttribute('x',upper.x);
        txt.setAttribute('y',(yTop+yBot)/2+3);
        txt.setAttribute('font-size','8.5');
        txt.setAttribute('fill',labelColor||'rgba(80,68,60,0.78)');

        txt.setAttribute('font-family','inherit');

    // (only 起床 shows), to avoid label collision when they're essentially
    // the same moment.
    const fmtHM=iso=>{

      return p(d.getHours())+':'+p(d.getMinutes());
    };
    const drawPointLabel=(s,i,p)=>{
      if(!crop) return;
      if(!p||!p.inBand) return;
      const item=data[i];
      // 醒來 / 起床 proximity check
      if(s.key==='wake' && item.wake && item.getup){
        const dW=new Date(item.wake).getTime();
        const dG=new Date(item.getup).getTime();
        if(!isNaN(dW)&&!isNaN(dG)&&Math.abs(dG-dW)<5*60*1000) return; // skip
      }
      const txt=document.createElementNS(NS,'text');
      txt.setAttribute('x',p.x);
      txt.setAttribute('y',p.y-4); // small offset above the dot

      txt.setAttribute('fill',s.color);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('font-family','inherit');
      txt.setAttribute('paint-order','stroke');
      txt.setAttribute('stroke','#ffffff');
      txt.setAttribute('stroke-width','2');

    };

      tooltip.style.left=(ev.clientX-r.left)+'px';
      tooltip.style.top=(ev.clientY-r.top-6)+'px';

      tooltip.classList.add('on');
    };

        if(!p||!p.inBand) return;

        c.setAttribute('cx',p.x); c.setAttribute('cy',p.y);
        c.setAttribute('r','2.4'); c.setAttribute('fill',s.color);
        c.style.cursor='pointer';
        // Enlarged invisible hit-area for easier hover

        hit.setAttribute('r','7'); hit.setAttribute('fill','transparent');
        hit.style.cursor='pointer';
        const onEnter=(ev)=>showTooltip(ev,s.name,data[i][s.key],data[i].date);
        const onMove=(ev)=>showTooltip(ev,s.name,data[i][s.key],data[i].date);
        const onLeave=()=>hideTooltip();
        hit.addEventListener('mouseenter',onEnter);
        hit.addEventListener('mousemove',onMove);
        hit.addEventListener('mouseleave',onLeave);
        c.addEventListener('mouseenter',onEnter);
        c.addEventListener('mousemove',onMove);
        c.addEventListener('mouseleave',onLeave);
        svg.appendChild(c);
        svg.appendChild(hit);
        // In crop mode, write the Y-axis time directly next to the dot.
        drawPointLabel(s,i,p);
      });
    });
    // ── X-axis: date labels along the bottom ─────────────────────────
    // Show every Nth point so labels don't overlap; minimum width per
    // visible label ≈ 34px so MM/DD fits comfortably. The last point
    // always gets a label so the latest date is visible.
    const labelLineY=PAD_T+innerH+0.5;
    {
      const axisLine=document.createElementNS(NS,'line');
      axisLine.setAttribute('x1',PAD_L); axisLine.setAttribute('x2',svgW-PAD_R);
      axisLine.setAttribute('y1',labelLineY); axisLine.setAttribute('y2',labelLineY);
      axisLine.setAttribute('stroke','rgba(165,155,145,0.32)');
      axisLine.setAttribute('stroke-width','0.5');
      svg.appendChild(axisLine);
    }
    const minLabelW=34;
    const labelStep=Math.max(1,Math.ceil(minLabelW/Math.max(1,cellW)));
    const fmtMMDD=(dateKey)=>{
      if(!dateKey) return '';
      const m=String(dateKey).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m) return parseInt(m[2],10)+'/'+parseInt(m[3],10);
      return dateKey;
    };
    data.forEach((d,i)=>{
      const isLast=(i===N-1);
      if(!(isLast||i%labelStep===0)) return;
      // Tiny tick mark above the label
      const tick=document.createElementNS(NS,'line');
      tick.setAttribute('x1',xOf(i)); tick.setAttribute('x2',xOf(i));
      tick.setAttribute('y1',labelLineY); tick.setAttribute('y2',labelLineY+2);
      tick.setAttribute('stroke','rgba(165,155,145,0.45)');
      tick.setAttribute('stroke-width','0.5');
      svg.appendChild(tick);
      // Date label
      const txt=document.createElementNS(NS,'text');
      txt.setAttribute('x',xOf(i));
      txt.setAttribute('y',labelLineY+11);
      txt.setAttribute('font-size','8.5');
      txt.setAttribute('fill','rgba(125,116,108,0.78)');
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('font-family','inherit');
      txt.textContent=fmtMMDD(d.date);
      svg.appendChild(txt);
    });
    scroller.appendChild(svg);
    if(fit){
      // Fit mode: chart already fills the viewport, no scrolling needed.
      scroller.style.overflow='hidden';
    } else {
      // Initial scroll: position so 10:00 (today, hr=19) is at the viewport top —
      // the core 22:00→10:00 band fills the visible area by default.
      const coreTopY=yOfRaw(19/24);
      scroller.scrollTop=Math.max(0, coreTopY);
      // Initial X: latest date at the right edge (so today is visible)
      scroller.scrollLeft=Math.max(0, svgW-scroller.clientWidth);
    }
  };
  // Defer two RAFs so the flex layout has settled
  requestAnimationFrame(()=>requestAnimationFrame(renderInside));
  // Re-render on resize so the scroll geometry stays sane
  if(typeof ResizeObserver!=='undefined'){
    const ro=new ResizeObserver(()=>renderInside());
    ro.observe(wrap);
  }
  return wrap;
}

  document.body.appendChild(host);

      a.href=url;
      a.download=('trend_sleep_'+(tv.from||'')+'_'+(tv.to||'')+'.png').replace(/\s+/g,'_');
      a.click();
      setTimeout(()=>{URL.revokeObjectURL(url);host.remove();},1500);
    },'image/png');
  };
  img.onerror=(e)=>{
    console.error('SVG load failed',e);
    alert('導出失敗：圖像載入錯誤');
    host.remove();
  };
  img.src=svgB64;
  }));
}
function rTrendCard(){
  // Trend chart state is session-only: every fresh page load resets to
  // "past 7 days · 按日". Within the session, user changes update tv in
  // memory and stay until refresh/navigation. The persistence layer strips
  // tv before saving (see saveAll / hydrateFromDB).
  const tv=S.workspace.trendView=S.workspace.trendView||{};
  if(!tv._sessionInit){
    const todayKey=calendarDayKey(new Date());
    const sevenDaysAgoKey=(()=>{ const d=new Date(); d.setDate(d.getDate()-6); return calendarDayKey(d); })();
    tv.from=sevenDaysAgoKey;

  // bucket select moves to the second row (alongside legend)

  [['day','按日'],['week','按週'],['ten','按十日'],['month','按月'],['quarter','按三月']].forEach(([v,l])=>{
    bucketSel.appendChild(h('option',{value:v,selected:tv.bucket===v},l));
  });
  bucketSel.onchange=()=>{ tv.bucket=bucketSel.value; R(); };
  card.appendChild(bar);
  // Second row: bucket dropdown (left) + legend (right) on a single line
  const ctrlRow=h('div',{st:{display:'flex',alignItems:'center',gap:'8px',flexShrink:'0',flexWrap:'wrap'}});
  ctrlRow.appendChild(bucketSel);
  const legend=h('div',{st:{display:'flex',gap:'8px',fontSize:'9px',flexWrap:'wrap',marginLeft:'auto',justifyContent:'flex-end'}});
  const legendItems=[
    ['rgba(155,125,195,0.92)','入睡'],
    ['rgba(86,144,199,0.92)','醒來'],
    ['rgba(204,162,74,0.92)','起床'],
    ['rgba(178,158,210,0.32)','睡眠'],
    ['rgba(204,162,74,0.28)','賴床']
  ];
  legendItems.forEach(([color,name])=>{
    const item=h('div',{st:{display:'flex',alignItems:'center',gap:'3px'}});
    item.appendChild(h('span',{st:{width:'8px',height:'3px',background:color,borderRadius:'2px'}}));
    item.appendChild(h('span',{st:{color:'var(--text3)'}},name));
    legend.appendChild(item);
  });
  ctrlRow.appendChild(legend);
  card.appendChild(ctrlRow);
  // Charts
  const charts=h('div',{st:{flex:'1',display:'flex',flexDirection:'column',gap:'6px',minHeight:'0',overflow:'hidden',width:'100%'}});
  try{

    charts.appendChild(h('div',{st:{fontSize:'10.5px',color:'rgba(192,88,88,0.8)',padding:'8px'}},'繪製失敗：'+String(e&&e.message||e)));
  }
  card.appendChild(charts);
  // Caption row hugs the bottom edge — sits below the chart with no gap.
  const captionRow=h('div',{st:{display:'flex',alignItems:'baseline',justifyContent:'center',flexShrink:'0',padding:'0 2px',marginTop:'-2px',position:'relative'}});
  const titleEl=h('button',{

  captionRow.appendChild(titleEl);

  card.appendChild(captionRow);
  return card;
}
