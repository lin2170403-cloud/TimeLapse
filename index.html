    let __sleepFlowTimers = [];
    function clearSleepFlowTimers() {
      __sleepFlowTimers.forEach(t => typeof t === 'function' ? t() : clearInterval(t));
      __sleepFlowTimers = [];
    }

    showSleepFlow = function() {
      const overlay = document.getElementById('sleepFlowOverlay');
      if (!overlay) return;
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
      // Lock body scroll so the main page behind the overlay doesn't move.
      document.body.style.overflow = 'hidden';
      renderSleepFlow();
    }

    function hideSleepFlow() {
      const overlay = document.getElementById('sleepFlowOverlay');
      if (!overlay) return;
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      clearSleepFlowTimers();
    }

    function enterSleepFlow() {
      S.sleepFlow.phase = 'sleep_assist';
      recSave();
      showSleepFlow();
    }

    function exitSleepFlow() {
      S.sleepFlow = { phase: null, sleepStartAt: null, napStartAt: null, morningExpanded: null, morningCompleted: {} };
      recSave();
      hideSleepFlow();
      // Full re-render on exit: morning mode may have added records to any
      // of 5 panels plus weight/weather, so it's simplest to rebuild.
      R();
    }

    // Up-slide transition between phases: the current page slides up & out,
    // then the new page slides up from below. 320ms per direction, total
    // ~640ms, which feels unhurried without being sluggish.
    function transitionSleepFlow(newPhase, extraUpdates) {
      const pageEl = document.getElementById('sleepFlowPage');
      if (!pageEl) return;
      // Check if page was already dismissed by swipe (opacity set to '0')
      const alreadyDismissed = pageEl.style.opacity === '0';
      function applyNewPhase() {
        S.sleepFlow.phase = newPhase;
        if (extraUpdates) Object.assign(S.sleepFlow, extraUpdates);
        if (newPhase === 'sleep_summary' || newPhase === 'no_sleep_summary') {
          const nowIso = new Date().toISOString();
          S.workspace.lastWakeAt = nowIso;
          S.sleepFlow.lazyStartAt = nowIso;
          save('workspace');
        }
        recSave();
        // Completely reset element state
        pageEl.removeAttribute('style');
        pageEl.classList.remove('swiping', 'entering', 'exiting');
        // Render new content
        renderSleepFlow();
        // Inline fade-in: set invisible, reflow, then animate to visible
        pageEl.style.opacity = '0';
        pageEl.style.transform = 'translateY(18px)';
        void pageEl.offsetHeight;
        pageEl.style.transition = 'opacity 350ms ease, transform 350ms ease';
        pageEl.style.opacity = '1';
        pageEl.style.transform = 'translateY(0)';
        setTimeout(() => { pageEl.removeAttribute('style'); }, 380);
      }
      if (alreadyDismissed) {
        applyNewPhase();
      } else {
        pageEl.classList.add('exiting');
        setTimeout(() => {
          pageEl.classList.remove('exiting');
          applyNewPhase();
        }, 320);
      }
    }

    function renderSleepFlow() {
      clearSleepFlowTimers();
      const pageEl = document.getElementById('sleepFlowPage');
      if (!pageEl) return;
      const phase = S.sleepFlow.phase;
      if (!phase) return;
      // Set phase-group data attributes for CSS theming
      const overlay = document.getElementById('sleepFlowOverlay');
      if (overlay) {
        const sleepPhases = ['sleep_assist','sleep_mode','nap_mode','nap_summary'];
        overlay.setAttribute('data-phase-group', sleepPhases.includes(phase) ? 'sleep' : 'wake');
        overlay.setAttribute('data-phase', phase);
      }
      const renderers = {
        sleep_assist: renderSleepAssistPage,
        sleep_mode: renderSleepModePage,
        sleep_summary: renderSleepSummaryPage,
        no_sleep_summary: renderNoSleepSummaryPage,
        getup_assist: renderGetupAssistPage,
        morning_mode: renderMorningModePage,
        nap_mode: renderNapModePage,
        nap_summary: renderNapSummaryPage
      };
      const renderer = renderers[phase];
      if (renderer) renderer(pageEl);
      else pageEl.innerHTML = '<div>未知階段：' + escH(phase) + '</div>';
      // All phases use fullscreen layout — no card frame
      pageEl.classList.add('sf-fullscreen');
    }

    // Helpers
    function formatClockNow() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function formatElapsedSince(isoStart) {
      if (!isoStart) return '—';
      const ms = Date.now() - new Date(isoStart).getTime();
      const total = Math.max(0, Math.round(ms / 60000));
      const h = Math.floor(total / 60);
      const m = total % 60;
      if (h) return h + ' 小時 ' + m + ' 分鐘';
      return m + ' 分鐘';
    }

    // Format milliseconds as HH:MM:SS for the live sleep/nap mode display.
    // Used in sleep_mode and nap_mode to give a "ticking stopwatch" look,
    // even though it's not a real timer — it's always (Date.now() - startAt).
    // Per the PDF spec: "Sleep Timer (not a real timer, as user is likely to
    // exit the page when sleeping, so actually it always reflect a calculated
    // time length between Now and the time when user entered the Sleep-Mode)."
    function formatHMS(ms) {
      if (!ms || ms < 0) ms = 0;
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      const pad = n => String(n).padStart(2, '0');
      return pad(h) + ':' + pad(m) + ':' + pad(s);
    }

    // Small closure helper used by forms that need a weather picker with
    // toggle-on-click behavior and a captured "selected value" variable.
    function wireWeatherPicker(container) {
      let picked = '';
      const buttons = container.querySelectorAll('[data-weather]');
      buttons.forEach(btn => {
        btn.onclick = () => {
          picked = picked === btn.dataset.weather ? '' : btn.dataset.weather;
          buttons.forEach(b => b.classList.toggle('selected', b.dataset.weather === picked));
        };
      });
      return () => picked;
    }

    // ── Swipe-up gesture handler ──
    function initSwipeUpHandler(pageEl, onSwipeComplete, threshold) {
      if (!threshold) threshold = 80;
      let startY = 0, startX = 0, tracking = false, deltaY = 0;
      function onStart(e) {
        const tag = (e.target.tagName || '').toUpperCase();
        if (['INPUT','TEXTAREA','SELECT'].includes(tag)) return;
        const t = e.touches[0];
        startY = t.clientY; startX = t.clientX;
        tracking = true; deltaY = 0;
      }
      function onMove(e) {
        if (!tracking) return;
        const t = e.touches[0];
        const dx = Math.abs(t.clientX - startX);
        const dy = startY - t.clientY;
        if (dx > dy + 10) { tracking = false; pageEl.classList.remove('swiping'); pageEl.style.transform = ''; pageEl.style.opacity = ''; return; }
        if (dy > 10) {
          e.preventDefault();
          deltaY = dy;
          pageEl.classList.add('swiping');
          const capped = Math.min(deltaY * 0.55, 220);
          pageEl.style.transform = 'translateY(-' + capped + 'px)';
          pageEl.style.opacity = String(Math.max(0.15, 1 - deltaY / 400));
        }
      }
      function onEnd() {
        if (!tracking) return;
        tracking = false;
        if (deltaY >= threshold) {
          pageEl.style.transition = 'transform 300ms ease-out, opacity 300ms ease-out';
          pageEl.style.transform = 'translateY(-100vh)';
          pageEl.style.opacity = '0';
          setTimeout(() => { onSwipeComplete(); }, 310);
        } else {
          pageEl.classList.remove('swiping');
          pageEl.style.transition = 'transform 250ms ease, opacity 250ms ease';
          pageEl.style.transform = '';
          pageEl.style.opacity = '';
          setTimeout(() => { pageEl.style.transition = ''; }, 260);
        }
      }
      // Mouse wheel (desktop): accumulate upward scroll, trigger on threshold
      let wheelAcc = 0, wheelTimer = null;
      function onWheel(e) {
        if (e.deltaY >= 0) { wheelAcc = 0; return; } // only upward scroll
        wheelAcc += Math.abs(e.deltaY);
        e.preventDefault();
        const progress = Math.min(wheelAcc / (threshold * 3), 1);
        pageEl.classList.add('swiping');
        pageEl.style.transform = 'translateY(-' + (progress * 120) + 'px)';
        pageEl.style.opacity = String(1 - progress * 0.6);
        clearTimeout(wheelTimer);
        wheelTimer = setTimeout(() => {
          if (wheelAcc >= threshold * 3) {
            pageEl.style.transition = 'transform 300ms ease-out, opacity 300ms ease-out';
            pageEl.style.transform = 'translateY(-100vh)';
            pageEl.style.opacity = '0';
            setTimeout(() => { onSwipeComplete(); }, 310);
          } else {
            pageEl.classList.remove('swiping');
            pageEl.style.transition = 'transform 250ms ease, opacity 250ms ease';
            pageEl.style.transform = '';
            pageEl.style.opacity = '';
            setTimeout(() => { pageEl.style.transition = ''; wheelAcc = 0; }, 260);
          }
        }, 200);
      }
      pageEl.addEventListener('touchstart', onStart, { passive: true });
      pageEl.addEventListener('touchmove', onMove, { passive: false });
      pageEl.addEventListener('touchend', onEnd, { passive: true });
      pageEl.addEventListener('wheel', onWheel, { passive: false });
      return function cleanup() {
        pageEl.removeEventListener('touchstart', onStart);
        pageEl.removeEventListener('touchmove', onMove);
        pageEl.removeEventListener('touchend', onEnd);
        pageEl.removeEventListener('wheel', onWheel);
        clearTimeout(wheelTimer);
      };
    }

        <div class="sleep-flow-title">早安</div>
        <div class="sleep-flow-timer-label">睡了</div>
        <div class="sleep-flow-timer" style="font-size:32px;margin:-4px 0 8px">${escH(durationLabel)}</div>
        <div class="sf-form-section">
          <div class="sf-form-label">睡眠質量</div>
          <div class="sf-chip-row" id="sfQualityRow">${qualityChips}</div>
        </div>
        <div class="sf-form-section">
          <div class="sf-form-label">今日天氣</div>
          <div class="sf-chip-row sf-chip-row-weather" id="sfWeatherRow">${weatherChips}</div>
        </div>
        <div class="sf-form-section">
          <div class="sf-form-label">備註</div>
          <textarea class="sf-textarea" id="sleepSummaryNotes" rows="2" placeholder="夢境、感受…"></textarea>
        </div>
        <button type="button" class="sf-submit-btn" id="sfSummarySubmit">繼續</button>`;
      // Quality chips toggle
      let pickedQuality = '';
      pageEl.querySelectorAll('[data-quality]').forEach(btn => {
        btn.onclick = () => {
          pickedQuality = pickedQuality === btn.dataset.quality ? '' : btn.dataset.quality;
          pageEl.querySelectorAll('[data-quality]').forEach(b => b.classList.toggle('on', b.dataset.quality === pickedQuality));
        };
      });
      // Weather chips toggle
      let pickedWeather = '';
      pageEl.querySelectorAll('[data-weather]').forEach(btn => {
        btn.onclick = () => {
          pickedWeather = pickedWeather === btn.dataset.weather ? '' : btn.dataset.weather;
          pageEl.querySelectorAll('[data-weather]').forEach(b => b.classList.toggle('on', b.dataset.weather === pickedWeather));
        };
      });
      document.getElementById('sfSummarySubmit').onclick = () => {
        const now = new Date();
        const notes = document.getElementById('sleepSummaryNotes').value;
        addLog('sleep',{
          id: uid(), kind: 'sleep', startAt: startAt, endAt: now.toISOString(),
          quality: pickedQuality, notes: notes,
          logicalDay: localDateText(now), createdAt: Date.now()
        });
        if (pickedWeather) setWeatherForDay(localDateText(now), pickedWeather);
        recSave();
        transitionSleepFlow('getup_assist');
      };
    }

    function renderNoSleepSummaryPage(pageEl) {
      const weatherChips = WEATHER_STICKERS.map(s =>
        `<button type="button" class="sf-chip sf-chip-weather" data-weather="${escH(s)}">${escH(s)}</button>`
      ).join('');
      pageEl.innerHTML = `
        <div class="sleep-flow-title">這一夜</div>
        <div class="sleep-flow-subtitle">沒有睡著也沒關係。</div>
        <div class="sf-form-section">
          <div class="sf-form-label">今日天氣</div>
          <div class="sf-chip-row sf-chip-row-weather">${weatherChips}</div>
        </div>
        <div class="sf-form-section">
          <div class="sf-form-label">備註</div>
          <textarea class="sf-textarea" id="noSleepNotes" rows="2" placeholder="在做什麼、感受如何"></textarea>
        </div>
        <button type="button" class="sf-submit-btn" id="sfNoSleepSubmit">繼續</button>`;
      let pickedWeather = '';
      pageEl.querySelectorAll('[data-weather]').forEach(btn => {
        btn.onclick = () => {
          pickedWeather = pickedWeather === btn.dataset.weather ? '' : btn.dataset.weather;
          pageEl.querySelectorAll('[data-weather]').forEach(b => b.classList.toggle('on', b.dataset.weather === pickedWeather));
        };
      });
      document.getElementById('sfNoSleepSubmit').onclick = () => {
        const now = new Date();
        const notes = document.getElementById('noSleepNotes').value;
        addLog('sleep',{
          id: uid(), kind: 'stayed_up', startAt: null, endAt: now.toISOString(),
          quality: '', notes: notes,
          logicalDay: localDateText(now), createdAt: Date.now()
        });
        if (pickedWeather) setWeatherForDay(localDateText(now), pickedWeather);
        recSave();
        transitionSleepFlow('getup_assist');
      };
    }

    function renderGetupAssistPage(pageEl) {
      function finalizeLazy() {
        if (S.sleepFlow.lazyStartAt) {
          const nowIso = new Date().toISOString();
          addLog('sleep', { id: uid(), kind: 'lazy', startAt: S.sleepFlow.lazyStartAt, endAt: nowIso, logicalDay: computeLogicalDay(nowIso), createdAt: Date.now() });
          S.sleepFlow.lazyStartAt = null;
          recSave();
        }
      }
      const doMorning = () => { finalizeLazy(); transitionSleepFlow('morning_mode'); };
      const lazyStart = S.sleepFlow.lazyStartAt;
      const computeLazyMs = () => lazyStart ? (Date.now() - new Date(lazyStart).getTime()) : 0;
      pageEl.innerHTML = `
        <div class="sf-corner-actions">
          <div class="sf-corner-clock" id="lazyModeClock">${escH(formatClockNow())}</div>
          <button type="button" class="sf-corner-btn" data-action="skip">直接結束</button>
        </div>
        <div class="sleep-flow-breathing" aria-hidden="true">
          <div class="sleep-flow-breath-inner">
            <div class="sleep-flow-timer-label">賴床</div>
            <div class="sleep-flow-timer stopwatch" id="lazyTimer">${escH(formatHMS(computeLazyMs()))}</div>
          </div>
        </div>
        <div class="sleep-flow-swipe-hint">
          <div class="sf-hint-arrow">↑</div>
          <div class="sf-hint-text">上滑開始晨間整備</div>
        </div>`;
      __sleepFlowTimers.push(setInterval(() => {
        const el = document.getElementById('lazyTimer');
        if (el) el.textContent = formatHMS(computeLazyMs());
        const ck = document.getElementById('lazyModeClock');
        if (ck) ck.textContent = formatClockNow();
      }, 1000));
      // Swipe up → morning mode
      __sleepFlowTimers.push(initSwipeUpHandler(pageEl, doMorning));
      // Desktop fallback
      const hint = pageEl.querySelector('.sleep-flow-swipe-hint');
      if (hint) hint.onclick = doMorning;
      // Skip button
      const skipBtn = pageEl.querySelector('[data-action="skip"]');
      if (skipBtn) skipBtn.onclick = () => { finalizeLazy(); exitSleepFlow(); };
    }

    // ── Morning Mode (list view + sub-form view) ────────────────────────
    // Morning mode is a mini-integration screen that lets the user record
    // the 7 morning routine items before closing the sleep flow:
    //   1. 體重        (inline number input)
    //   2. 開窗通風    (inline checkbox)
    //   3-7. 進食 / 飲水 / 補劑藥品 / 自我清潔 / 容貌管理
    //        → each opens a sub-form that reuses renderField with a
    //          'morning' context. Submitting adds a record to the
    //          corresponding panel and returns to the list. The list shows
    //          today's count per panel so the user sees progress.
    //
    // morningExpanded in S.sleepFlow holds which panel's sub-form is
    // currently open (null = list view). It's persisted so a browser close
    // mid-form resumes in the same place.

    // Which panels show up as quick-log items in morning mode.
    const MORNING_PANEL_IDS = ['food', 'drink', 'nutrients', 'selfcleaning', 'skincare'];

    // Ordered spec for all 7 morning items. Each entry becomes one tile on
    // the semicircle wheel. id can be a panel id, 'weight', or 'window_open'.
    const MORNING_ITEMS_SPEC = [
      { id: 'weight',       label: '體重' },
      { id: 'window_open',  label: '開窗' },
      { id: 'food',         label: '進食' },
      { id: 'drink',        label: '飲水' },
      { id: 'nutrients',    label: '補劑' },
      { id: 'selfcleaning', label: '清潔' },
      { id: 'skincare',     label: '護膚' }
    ];

    // Figure out which items should still appear on the wheel.
    //   - weight:      shown if no weight recorded for today
    //   - window_open: shown if window not opened for today
    //   - panels:      shown if not yet completed in THIS morning session
    //                  (tracked via S.sleepFlow.morningCompleted)
    // This gives the "tap → record → item disappears" behavior the user
    // wanted, while still allowing multiple meals per day via the main page
    // after morning prep ends.
    function getActiveMorningItems(today) {
      const completed = S.sleepFlow.morningCompleted || {};
      return MORNING_ITEMS_SPEC.filter(item => {
        if (item.id === 'weight') return !getWeightForDay(today);
        if (item.id === 'window_open') return !getWindowOpenForDay(today);
        return !completed[item.id];
      });
    }

    function renderMorningModePage(pageEl) {
      const expanded = S.sleepFlow.morningExpanded;
      if (expanded) {
        renderMorningSubForm(pageEl, expanded);
      } else {
        renderMorningWheel(pageEl);
      }
    }

    // Helper: build the top-right skip button markup. Used on every morning
    // page (wheel + sub-forms) so the user can bail out at any point.
    function morningSkipBtnHtml() {
      return '<button type="button" class="morning-skip-btn" data-action="skip-morning" aria-label="跳過晨間整備" title="跳過晨間整備">×</button>';
    }

    function wireMorningSkipBtn(pageEl) {
      const skipBtn = pageEl.querySelector('[data-action="skip-morning"]');
      if (skipBtn) skipBtn.onclick = () => exitSleepFlow();
    }

    function renderMorningWheel(pageEl) {
      const today = getActiveLogicalDay();
      const items = getActiveMorningItems(today);

      // All 7 items done → show a completion page.
      if (items.length === 0) {
        pageEl.innerHTML = `
          ${morningSkipBtnHtml()}
          <div class="sleep-flow-title">整備完成</div>
          <div class="sleep-flow-subtitle">今天的晨間整備已經全部完成。好好開始這一天。</div>
          <div class="sf-action-row" style="margin-top:24px">
            <button type="button" class="sf-submit-btn" data-action="done">回到主頁</button>
          </div>`;
        wireMorningSkipBtn(pageEl);
        pageEl.querySelector('[data-action="done"]').onclick = () => exitSleepFlow();
        return;
      }

      // Layout math: distribute items along a semicircle arc at the bottom
      // of the page. Arc spans at most 160° (from -80° to +80°). With fewer
      // items we use a tighter span (28° between neighbors) to keep them
      // from drifting too close to the edges.
      const N = items.length;
      const baseStep = 28; // desired degrees between neighbors
      const naturalSpan = (N - 1) * baseStep;
      const span = Math.min(160, naturalSpan);
      // Recompute the actual step after clamping so items stay symmetric.
      const actualStep = N > 1 ? span / (N - 1) : 0;
      const startAngle = -span / 2;
      const anglesDeg = N === 1 ? [0] : items.map((_, i) => startAngle + i * actualStep);

      // The wheel container uses --wheel-radius (set in CSS, responsive).
      // Each item uses rotate(angle) + translate(0, -R) + counter-rotate
      // to land on the arc while staying upright.
      const itemsHtml = items.map((item, i) => {
        const angle = anglesDeg[i];
        return `
          <div class="morning-wheel-radial" style="--angle:${angle}deg">
            <button type="button" class="morning-wheel-item" data-morning-item="${item.id}">
              <span class="morning-wheel-label">${escH(item.label)}</span>
            </button>
          </div>`;
      }).join('');

      pageEl.innerHTML = `
        ${morningSkipBtnHtml()}
        <div class="sleep-flow-title">晨間整備</div>
        <div class="sleep-flow-subtitle">輕觸任意一項開始記錄。完成後它會從輪盤消失。</div>
        <div class="morning-wheel-wrap">
          <div class="morning-wheel">
            ${itemsHtml}
          </div>
        </div>
        <div class="sf-action-row">
          <button type="button" class="sf-back-link" data-action="done">提早結束整備</button>
        </div>`;

      wireMorningSkipBtn(pageEl);

      pageEl.querySelectorAll('[data-morning-item]').forEach(btn => {
        btn.onclick = () => {
          S.sleepFlow.morningExpanded = btn.dataset.morningItem;
          recSave();
          renderSleepFlow();
        };
      });

      pageEl.querySelectorAll('[data-action="done"]').forEach(btn => {
        btn.onclick = () => exitSleepFlow();
      });
    }

    // Dispatcher: one function that handles all sub-form types (weight,
    // window_open, and the 5 panels). Keeping them in one place makes the
    // "expanded" state machine simpler.
    function renderMorningSubForm(pageEl, itemId) {
      if (itemId === 'weight') { renderMorningWeightForm(pageEl); return; }
      if (itemId === 'window_open') { renderMorningWindowForm(pageEl); return; }
      const panel = REC_PANELS.find(p => p.id === itemId);
      if (!panel) {
        // Unknown item — bail back to the wheel safely.
        S.sleepFlow.morningExpanded = null;
        renderSleepFlow();
        return;
      }
      renderMorningPanelForm(pageEl, panel);
    }

    function renderMorningWeightForm(pageEl) {
      const today = getActiveLogicalDay();
      const currentWeight = getWeightForDay(today);
      const goBack = () => { S.sleepFlow.morningExpanded = null; recSave(); renderSleepFlow(); };
      pageEl.innerHTML = `
        ${morningSkipBtnHtml()}
        <div class="sleep-flow-title">體重</div>
        <div class="sleep-flow-subtitle">記一下今天起床後的體重。</div>
        <div class="sf-form-section">
          <input type="number" step="0.1" class="sf-input-centered" id="morningWeightValue" value="${escH(currentWeight || '')}" placeholder="42.5 kg" />
        </div>
        <div class="sf-action-row">
          <button type="button" class="sf-submit-btn" id="sfWeightSave">保存</button>
          <button type="button" class="sf-back-link" data-action="back">返回</button>
        </div>`;
      const skipBtn = pageEl.querySelector('[data-action="skip-morning"]');
      if (skipBtn) skipBtn.onclick = goBack;
      pageEl.querySelector('[data-action="back"]').onclick = goBack;
      document.getElementById('sfWeightSave').onclick = () => {
        const v = document.getElementById('morningWeightValue').value;
        if (v) setWeightForDay(today, v);
        goBack();
      };
      setTimeout(() => { const inp = document.getElementById('morningWeightValue'); if (inp) inp.focus(); }, 50);
    }

    function renderMorningWindowForm(pageEl) {
      const today = getActiveLogicalDay();
      const goBack = () => { S.sleepFlow.morningExpanded = null; recSave(); renderSleepFlow(); };
      pageEl.innerHTML = `
        ${morningSkipBtnHtml()}
        <div class="sleep-flow-title">開窗通風</div>
        <div class="sleep-flow-subtitle">讓一些新鮮空氣進來。</div>
        <div class="sf-action-row" style="margin-top:24px">
          <button type="button" class="sf-submit-btn" data-action="confirm">已經開窗了</button>
          <button type="button" class="sf-back-link" data-action="back">返回</button>
        </div>`;
      const skipBtn = pageEl.querySelector('[data-action="skip-morning"]');
      if (skipBtn) skipBtn.onclick = goBack;
      pageEl.querySelector('[data-action="back"]').onclick = goBack;
      pageEl.querySelector('[data-action="confirm"]').onclick = () => {
        setWindowOpenForDay(today, true);
        goBack();
      };
    }

    function renderMorningPanelForm(pageEl, panel) {
      const panelId = panel.id;
      pageEl.innerHTML = `
        ${morningSkipBtnHtml()}
        <div class="sleep-flow-title">${escH(titleText(panel.title))}</div>
        <div class="morning-scroll" style="flex:1;min-height:0;width:100%;overflow-y:auto;padding:0 4px">
          <form class="sleep-flow-form morning-subform" id="morningSubForm" style="width:100%;max-width:400px;margin:0 auto">
            <div class="form-grid morning-form-grid" data-dynamic-fields="${panelId}">
              ${panel.fields.map(field => recRenderField(panelId, field, {}, 'morning')).join('')}
            </div>
          </form>
        </div>
        <div class="sf-action-row" style="flex-shrink:0;padding-top:12px">
          <button type="button" class="sf-submit-btn" data-action="morning-submit">新增紀錄</button>
          <button type="button" class="sf-back-link" data-action="back">返回</button>
        </div>`;

      // × button: in a sub-form, × should return to the wheel, NOT exit
      // the entire flow. Only on the wheel does × exit.
      const skipBtn = pageEl.querySelector('[data-action="skip-morning"]');
      if (skipBtn) skipBtn.onclick = () => {
        S.sleepFlow.morningExpanded = null;
        recSave();
        renderSleepFlow();
      };

      // Wire conditional/tag controls scoped to the morning form grid.
      const morningMount = pageEl.querySelector(`[data-dynamic-fields="${panelId}"]`) || pageEl;
      sfBindTagControls(panelId, 'morning', morningMount);
      sfBindConditional(panelId, 'morning', morningMount);

      // Back button → wheel
      pageEl.querySelector('[data-action="back"]').onclick = () => {
        S.sleepFlow.morningExpanded = null;
        recSave();
        renderSleepFlow();
      };

      // Submit: now triggered by button click, not form submit, so the
      // button can live outside the form element.
      pageEl.querySelector('[data-action="morning-submit"]').onclick = () => {
        const overlayRoot = document.getElementById('sleepFlowOverlay');
        const data = recGetValues(panelId, 'morning', overlayRoot);
        sfAddTagsFromRecord(panel, data);
        const stamp = nowStamp();
        const record = {
          ...data,
          id: uid(),
          executiveDate: stamp.isoDate,
          executiveTime: stamp.isoDateTime,
          executiveTimeLabel: stamp.label,
          createdAt: Date.now()
        };
        addLog(panelId, record);
        if (!S.sleepFlow.morningCompleted) S.sleepFlow.morningCompleted = {};
        S.sleepFlow.morningCompleted[panelId] = true;
        recSave();
        S.sleepFlow.morningExpanded = null;
        renderSleepFlow();
      };
    }
    // ─────────────────────────────────────────────────────────────────────

    function renderNapModePage(pageEl) {
      const startAt = S.sleepFlow.napStartAt;
      const computeMs = () => Date.now() - new Date(startAt).getTime();
      pageEl.innerHTML = `
        <div class="sleep-flow-breathing" aria-hidden="true"></div>
        <div class="sleep-flow-title">小睡中</div>
        <div class="sleep-flow-subtitle">閉上眼，放鬆一會兒。</div>
        <div class="sleep-flow-timer-label">已經過</div>
        <div class="sleep-flow-timer stopwatch" id="napTimer">${escH(formatHMS(computeMs()))}</div>
        <div class="sleep-flow-buttons">
          <button type="button" class="sleep-flow-btn primary" data-action="wake">我醒了</button>
          <button type="button" class="sleep-flow-btn ghost" data-action="cancel">取消小睡</button>
        </div>`;
      __sleepFlowTimers.push(setInterval(() => {
        const el = document.getElementById('napTimer');
        if (el) el.textContent = formatHMS(computeMs());
      }, 1000));
      pageEl.querySelectorAll('[data-action]').forEach(btn => {
        btn.onclick = () => {
          if (btn.dataset.action === 'wake') {
            transitionSleepFlow('nap_summary');
          } else {
            S.sleepFlow.napStartAt = null;
            transitionSleepFlow('sleep_assist');
          }
        };
      });
    }

    function renderNapSummaryPage(pageEl) {
      const startAt = S.sleepFlow.napStartAt;
      pageEl.innerHTML = `
        <div class="sleep-flow-title">小睡結束</div>
        <div class="sleep-flow-subtitle">好好地休息了一會兒。</div>
        <div class="sleep-flow-timer-label">小睡時長</div>
        <div class="sleep-flow-timer">${escH(formatElapsedSince(startAt))}</div>
        <div class="sleep-flow-buttons">
          <button type="button" class="sleep-flow-btn primary" data-action="done">回到主頁</button>
        </div>`;
      pageEl.querySelector('[data-action="done"]').onclick = () => {
        const now = new Date();
        
        addLog('sleep',{
          id: uid(),
          kind: 'nap',
          startAt: startAt,
          endAt: now.toISOString(),
          quality: '',
          notes: '',
          // Nap doesn't reset logicalDay — use whichever wake-period endAt
          // falls into. computeLogicalDay handles this.
          logicalDay: computeLogicalDay(now),
          createdAt: Date.now()
        });
        recSave();
        exitSleepFlow();
      };
    }
    // ══════════════════════════════════════════════════════════════════════

    // ── JSON backup / restore ─────────────────────────────────────────────
    // Exports the entire persisted state (records + tags) as a JSON file
    // for the user to save locally. Imports read a file, confirm with the
    // user, replace the in-memory state, persist it, and re-render.
    //
    // Shape of the exported JSON:
    //   {
    //     version: 1,
    //     exportedAt: ISO string,
    //     records: { food: [...], drink: [...], ..., sleep: [...], weight: [...], weather: [...] },
    //     tags:    { food_name: [...], ... }
    //   }
// ── Legacy migration from separate timelapse_records IDB ──
(async function migrateRecordsIDB(){
  try{
    if(S.logs.length>0)return;
    const db=await new Promise((res,rej)=>{
      const req=indexedDB.open('timelapse_records',1);
      req.onupgradeneeded=()=>req.result.createObjectStore('kv');
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    });
    const data=await new Promise((res,rej)=>{
      const tx=db.transaction('kv','readonly');
      const rq=tx.objectStore('kv').get('records_v1');
      rq.onsuccess=()=>res(rq.result);
      rq.onerror=()=>rej(rq.error);
    });
    db.close();
    if(!data)return;
    if(data.records&&typeof data.records==='object'){
      const flat=[];
      Object.keys(data.records).forEach(pid=>{
        if(Array.isArray(data.records[pid])) data.records[pid].forEach(r=>flat.push({...r,panelId:pid}));
      });
      if(flat.length){S.logs=flat;recSave()}
    }
    if(data.tags&&typeof data.tags==='object'){
      S.rtags=recBuildTags({...S.rtags,...data.tags});recSave();
    }
    console.log('Records migrated from legacy timelapse_records IDB');
  }catch(e){/* no legacy data */}
})();

})();
</script>
