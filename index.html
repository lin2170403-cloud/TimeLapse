recOpenLog=function(tab,scrollTarget){
  recDismiss();_logTab=tab||_logTab||'all';
  // Day-mode filters default to *calendar* today, unless the caller supplied
  // a scrollTarget with an `at` timestamp — in that case, jump straight to
  // that record's day.
  const __today=calendarDayKey(new Date());
  const __targetDay=(scrollTarget&&scrollTarget.at)?(function(){
    try{return calendarDayKey(new Date(scrollTarget.at));}catch{return __today}
  })():__today;
  if(!S.recFilters||typeof S.recFilters!=='object') S.recFilters={};
  S.recFilters._all={mode:'day',day:__targetDay};
  // Force *every* existing filter to the target day (single-day mode).
  // Range filters that haven't been touched also follow the target day.
  Object.keys(S.recFilters).forEach(k=>{
    if(k==='_all')return;
    const fk=S.recFilters[k];if(!fk)return;
    if(fk.mode==='day') fk.day=__targetDay;
    if(fk.mode==='range' && !fk._userSet){ fk.day=__targetDay; }
  });
  // Pre-create filters for tabs/panels that haven't been opened yet so the
  // initial render uses __targetDay instead of falling back to today.
  const __ensureFilter=(k)=>{
    const fk=S.recFilters[k];
    if(!fk){ S.recFilters[k]={mode:'day',day:__targetDay}; return; }
    if(fk.mode==='day') fk.day=__targetDay;
  };
  // The active tab itself
  if(_logTab!=='all'){ __ensureFilter(_logTab); }
  // Plus any individual panel that will appear in the body (used by the
  // "showPanels" loop in recRenderLogBody). REC_PANELS is available globally.
  if(typeof REC_PANELS!=='undefined'){
    REC_PANELS.forEach(p=>__ensureFilter(p.id));
  }
  __ensureFilter('sleep');
  const ov=document.createElement('div');ov.className='rec-log-mo';
  ov.addEventListener('click',e=>{if(e.target===ov)recDismiss()});
  const box=document.createElement('div');box.className='rec-log-box';
  const tabs=[{id:'all',label:'全部'},{id:'sleep',label:'睡眠'},...REC_PANELS.map(p=>({id:p.id,label:p.title})),{id:'inventory',label:'在庫'},{id:'housework',label:'家務'},{id:'work',label:'工作'}];
  box.innerHTML=`<div class="rec-log-head"><div style="font-size:15px;font-weight:600">紀錄日誌</div><div style="display:flex;align-items:center;gap:8px"><button data-rexp title="導出圖片" style="font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font-family:inherit;color:var(--text2)">📷 導出圖片</button><button class="rec-close" data-rx>×</button></div></div>
    <div class="rec-log-tabs" id="recLogTabs">${tabs.map(t=>`<button class="${t.id===_logTab?'on':''}" data-rlt="${t.id}">${escH(t.label)}</button>`).join('')}</div>
    <div class="rec-log-body" id="recLogBody"></div>`;
  ov.appendChild(box);document.body.appendChild(ov);_recOv=ov;
  box.querySelector('[data-rx]').onclick=recDismiss;
  box.querySelector('[data-rexp]').onclick=recExportLogImage;
  box.querySelectorAll('[data-rlt]').forEach(b=>b.onclick=()=>{_logTab=b.dataset.rlt;recRenderLogBody();box.querySelectorAll('[data-rlt]').forEach(x=>x.classList.toggle('on',x.dataset.rlt===_logTab))});
  recRenderLogBody();
  // Scroll to the targeted record's section/row, if provided.
  // Retry with rAF + polling because sub-section renderers may finish
  // a tick later than recRenderLogBody itself (filter syncs, async
  // table re-renders, etc.). Without polling, the first click sometimes
  // scrolls before the target row exists.
  if(scrollTarget){
    const tabName=({all:'全部',sleep:'睡眠',inventory:'在庫管理',housework:'家務記錄',work:'工作記錄'})[_logTab]
      || (REC_PANELS.find(p=>p.id===_logTab)?.title);
    const findTarget=()=>{
      const bodyEl=box.querySelector('#recLogBody');
      if(!bodyEl)return null;
      // Prefer the specific row by record id (panel-record buttons have data-rid)
      if(scrollTarget.recordId){
        const row=bodyEl.querySelector(`[data-rid="${scrollTarget.recordId}"]`);
        if(row) return row.closest('tr')||row;
      }
      // Otherwise the section heading
      if(tabName){
        const heads=bodyEl.querySelectorAll('.rec-log-section h4');
        for(const h of heads){ if(h.textContent.trim()===tabName) return h.closest('.rec-log-section')||h; }
      }
      return null;
    };
    let attempts=0;
    const maxAttempts=20; // ~20 frames (~330ms) — well past any sub-render
    const tryScroll=()=>{
      const target=findTarget();
      if(target){
        // Flash highlight if we matched a specific row
        if(target.tagName==='TR'){
          target.style.transition='background .4s';
          const prev=target.style.background;
          target.style.background='rgba(178,158,210,0.25)';
          setTimeout(()=>{target.style.background=prev;},900);
        }
        // Wait one more frame so layout settles, then scroll
        requestAnimationFrame(()=>{
          try{ target.scrollIntoView({behavior:'smooth',block:'start'}); }catch{}
        });
        return;
      }
      if(++attempts<maxAttempts){
        requestAnimationFrame(tryScroll);
      }
    };
    requestAnimationFrame(tryScroll);
  }
}

// Past-N-days helper (returns ISO date key for `n` days before today)
function recDaysAgoKey(n){
  const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-Number(n||0));
  return calendarDayKey(d);
}

// ── Bleeding event analyzer ───────────────────────────────────────
// Groups bleeding records into events per the spec:
//   - consecutive days OR a single-day gap → same event (1-day gaps filled)
//   - ≥2-day gap → new event (new D1)
// Each event gets a status:
//   active       — today is within ≤1 day of last bleeding (in progress)
//   irregular    — finalized, length < 4 (→ 不正出血)
//   period       — finalized, length ≥ 4 (→ 月經)
// Per-day phase keys (used for label & calendar dot color):
//   'judging'         — D1-D3 of an active event (顏色: 橘紅)
//   'irregular'       — finalized <4 days (顏色: 棕)
//   'period'          — finalized ≥4 days, D1-D8 (顏色: 亮紅)
//   'period_extended' — D9+ of any event (顏色: 酒紅)
function _dayKeyOf(d){return calendarDayKey(d);}
window._addDays=function _addDays(key,n){const d=new Date(key+'T00:00:00');d.setDate(d.getDate()+n);return calendarDayKey(d);}
window._daysBetween=function _daysBetween(aKey,bKey){const a=new Date(aKey+'T00:00:00');const b=new Date(bKey+'T00:00:00');return Math.round((b-a)/86400000);}
// Re-bind to the local IIFE names so existing internal callers keep working
const _addDays=window._addDays, _daysBetween=window._daysBetween;
window.getPeriodAnalysis=function getPeriodAnalysis(){
  const todayKey=calendarDayKey(new Date());
  // Collect bleeding records (panelId='period') sorted by date asc
  const records=(S.logs||[]).filter(l=>l && l.panelId==='period' && l.executiveDate)
    .slice().sort((a,b)=>(a.executiveDate||'').localeCompare(b.executiveDate||''));
  // Dedupe by date (keep first)
  const seenDates=new Set();
  const dateList=[];
  records.forEach(r=>{
    if(seenDates.has(r.executiveDate)) return;
    seenDates.add(r.executiveDate);
    dateList.push(r.executiveDate);
  });
  // Build events
  const events=[];
  let cur=null;
  for(const dk of dateList){
    if(!cur){ cur={d1:dk,days:[dk]}; continue; }
    const last=cur.days[cur.days.length-1];
    const gap=_daysBetween(last,dk);
    if(gap===1){
      cur.days.push(dk);
    } else if(gap===2){
      // single-day gap → fill the missing day and append
      cur.days.push(_addDays(last,1));
      cur.days.push(dk);
    } else {
      events.push(cur);
      cur={d1:dk,days:[dk]};
    }
  }
  if(cur) events.push(cur);
  // Derive event length & status; build per-date phase map
  const phaseByDate={};
  events.forEach(ev=>{
    const lastDay=ev.days[ev.days.length-1];
    const lastIdx=_daysBetween(ev.d1,lastDay)+1; // span in days
    ev.length=lastIdx;
    const gapFromToday=_daysBetween(lastDay,todayKey);
    const finalized=gapFromToday>=2;
    if(!finalized){
      ev.status='active';
    } else {
      ev.status=lastIdx>=4?'period':'irregular';
    }
    // Per-day phase
    ev.days.forEach(dk=>{
      const dn=_daysBetween(ev.d1,dk)+1; // 1-based
      let phase;
      if(ev.status==='active'){
        if(dn<=3) phase='judging';
        else if(dn<=8) phase='period';
        else phase='period_extended';
      } else if(ev.status==='irregular'){
        phase='irregular';
      } else { // period
        phase=dn>=9?'period_extended':'period';
      }
      phaseByDate[dk]={phase,dn,event:ev};
    });
  });
  // Prediction window — anchor = D1 of last finalized 月經 event
  let prediction=null;
  const periodEvents=events.filter(e=>e.status==='period');
  if(periodEvents.length>0){
    const lastPeriod=periodEvents[periodEvents.length-1];
    const anchor=lastPeriod.d1;
    // Gather inter-period gaps from confirmed 月經 events
    const gaps=[];
    for(let i=1;i<periodEvents.length;i++){
      const g=_daysBetween(periodEvents[i-1].d1,periodEvents[i].d1);
      if(g>=21 && g<=40) gaps.push(g);
    }
    let median, half=3;
    if(gaps.length===0){
      median=28;
    } else if(gaps.length<=2){
      // Observation value (latest) ±3
      median=gaps[gaps.length-1];
    } else if(gaps.length<=5){
      const sorted=[...gaps].sort((a,b)=>a-b);
      median=sorted[Math.floor(sorted.length/2)];
    } else {
      const recent=gaps.slice(-6).sort((a,b)=>a-b);
      median=(recent[2]+recent[3])/2;
    }
    let minDay=_addDays(anchor,Math.round(median-half));
    let peakDay=_addDays(anchor,Math.round(median));
    let maxDay=_addDays(anchor,Math.round(median+half));
    // Delay handling: if today > maxDay
    const elapsedPast=_daysBetween(maxDay,todayKey);
    let delayState=null;
    if(elapsedPast>0 && elapsedPast<=7){
      delayState={stage:1,days:elapsedPast};
    } else if(elapsedPast>7 && elapsedPast<=21){
      // Stage 2: rolling window — shift forward by (elapsedPast-7)
      const shift=elapsedPast-7;
      minDay=_addDays(_addDays(todayKey,11),0);
      peakDay=_addDays(todayKey,14);
      maxDay=_addDays(todayKey,17);
      delayState={stage:2,days:elapsedPast};
    } else if(elapsedPast>21){
      delayState={stage:3,days:elapsedPast};
      // pause prediction
      minDay=null; peakDay=null; maxDay=null;
    }
    prediction={anchor,median,minDay,peakDay,maxDay,delay:delayState};
  }
  return {events,phaseByDate,prediction,todayKey};
}
// Helper for table column: takes a record and returns the phase label
function periodPhaseLabel(r){
  if(!r||!r.executiveDate) return '';
  const an=getPeriodAnalysis();
  const entry=an.phaseByDate[r.executiveDate];
  if(!entry) return '出血';
  const {phase,dn}=entry;
  if(phase==='judging') return '新規出血第'+dn+'天';
  if(phase==='irregular') return '不正出血第'+dn+'天';
  if(phase==='period_extended') return '月經延長第'+dn+'天';
  return '月經第'+dn+'天';
}
// Propagate a {mode,day,from,to} state to every known filter key so that
// any tab's filter change applies globally.
function recApplyGlobalFilter(state){
  if(!state) return;
  const apply=(k)=>{
    const fk=S.recFilters[k]||(S.recFilters[k]={});
    fk.mode=state.mode;
    if(state.day!=null) fk.day=state.day;
    if(state.from!=null) fk.from=state.from;
    if(state.to!=null) fk.to=state.to;
    fk._userSet=true;
  };
  // _all canonical
  apply('_all');
  // sleep + tabs
  ['sleep','inventory','housework','work'].forEach(apply);
  // every REC_PANEL id
  REC_PANELS.forEach(p=>apply(p.id));
}

      html+=`<div class="rec-log-section"><h4>睡眠</h4><div id="recSleepWrap"></div></div>`;
    }else{
      const sf=S.recFilters['sleep']||(S.recFilters['sleep']={mode:'day',day:today});
      if(sf.mode==='day'&&!sf.day)sf.day=today;
      html+=`<div class="rec-log-section"><h4>睡眠</h4>
        <div class="rec-log-filter"><select id="recSleepMode"><option value="day"${sf.mode==='day'?' selected':''}>單日</option><option value="range"${sf.mode==='range'?' selected':''}>區間</option></select>
        <span id="recSleepDay" ${sf.mode!=='day'?'style="display:none"':''}><input type="date" id="recSleepDayVal" value="${sf.day||today}"/></span>
        <span id="recSleepRange" ${sf.mode!=='range'?'style="display:none"':''}><input type="date" id="recSleepFrom" value="${sf.from||today}"/> ～ <input type="date" id="recSleepTo" value="${sf.to||today}"/></span></div>
        <div id="recSleepWrap"></div></div>`;
    }
  }
  // Then regular panels
  showPanels.forEach(p=>{
    if(isAll){
      // No per-panel filter in "全部" mode
      html+=`<div class="rec-log-section"><h4>${escH(p.title)}</h4><div data-rtw="${p.id}"></div></div>`;
    } else {
      const fk=S.recFilters[p.id]||(S.recFilters[p.id]={mode:'day',day:today});
      if(fk.mode==='day'&&!fk.day)fk.day=today;
      html+=`<div class="rec-log-section"><h4>${escH(p.title)}</h4>
        <div class="rec-log-filter"><select data-rfm="${p.id}"><option value="day"${fk.mode==='day'?' selected':''}>單日</option><option value="range"${fk.mode==='range'?' selected':''}>區間</option></select>
        <span data-rfd="${p.id}" ${fk.mode!=='day'?'style="display:none"':''}><input type="date" data-rfday="${p.id}" value="${fk.day||today}"/></span>
        <span data-rfr="${p.id}" ${fk.mode!=='range'?'style="display:none"':''}><input type="date" data-rffrom="${p.id}" value="${fk.from||today}"/> ～ <input type="date" data-rfto="${p.id}" value="${fk.to||today}"/></span></div>
        <div data-rtw="${p.id}"></div></div>`;
    }
  });
  // Inventory / housework / work at the end
  if(showInventory) html+=`<div class="rec-log-section"><h4>在庫管理</h4><div id="recInventoryWrap"></div></div>`;
  if(showHousework) html+=`<div class="rec-log-section"><h4>家務記錄</h4><div id="recHouseworkWrap"></div></div>`;
  if(showWork) html+=`<div class="rec-log-section"><h4>工作記錄</h4><div id="recWorkWrap"></div></div>`;
  body.innerHTML=html;

  // ── Bind unified filter ──
  if(isAll){
    const syncAllFilter=()=>{
      showPanels.forEach(p=>{
        S.recFilters[p.id]=Object.assign(S.recFilters[p.id]||{},{mode:gf.mode,day:gf.day,from:gf.from,to:gf.to});
        recRenderTable(p.id);
      });
      const sleepDay=gf.mode==='day'?gf.day:today;
      if(showSleep) recRenderSleepSection(body.querySelector('#recSleepWrap'),sleepDay,gf.mode,gf.from,gf.to);
      if(showInventory) recRenderInventorySection(body.querySelector('#recInventoryWrap'),sleepDay);
      if(showHousework) recRenderHouseworkSection(body.querySelector('#recHouseworkWrap'),sleepDay,gf.mode,gf.from,gf.to);
      if(showWork) recRenderWorkSection(body.querySelector('#recWorkWrap'),sleepDay,gf.mode,gf.from,gf.to);
    };
    const modeEl=body.querySelector('#recAllMode');
    const dayEl=body.querySelector('#recAllDayVal');
    const fromEl=body.querySelector('#recAllFrom');
    const toEl=body.querySelector('#recAllTo');
    if(modeEl)modeEl.onchange=()=>{
      gf.mode=modeEl.value;
      if(gf.mode==='range'){
        // Default range = past 7 days (today inclusive)
        gf.from=recDaysAgoKey(6);
        gf.to=calendarDayKey(new Date());
        gf._userSet=true;
        recApplyGlobalFilter(gf);
        recRenderLogBody(); return;
      }
      recApplyGlobalFilter(gf);
      body.querySelector('#recAllDay').style.display=gf.mode==='day'?'':'none';
      body.querySelector('#recAllRange').style.display=gf.mode==='range'?'':'none';
      syncAllFilter();
    };
    if(dayEl)dayEl.onchange=()=>{gf.day=dayEl.value;recApplyGlobalFilter(gf);syncAllFilter()};
    if(fromEl)fromEl.onchange=()=>{gf.from=fromEl.value;gf._userSet=true;recApplyGlobalFilter(gf);syncAllFilter()};
    if(toEl)toEl.onchange=()=>{gf.to=toEl.value;gf._userSet=true;recApplyGlobalFilter(gf);syncAllFilter()};
    syncAllFilter();
  } else if(isNewTab){
    const syncNewFilter=()=>{
      const targetDay=nf.mode==='day'?(nf.day||today):(nf.from||today);
      if(showSleep) recRenderSleepSection(body.querySelector('#recSleepWrap'),targetDay,nf.mode,nf.from,nf.to);
      if(showInventory) recRenderInventorySection(body.querySelector('#recInventoryWrap'),targetDay);
      if(showHousework) recRenderHouseworkSection(body.querySelector('#recHouseworkWrap'),targetDay,nf.mode,nf.from,nf.to);
      if(showWork) recRenderWorkSection(body.querySelector('#recWorkWrap'),targetDay,nf.mode,nf.from,nf.to);
    };
    const modeEl=body.querySelector('#recNewMode');
    const dayEl=body.querySelector('#recNewDayVal');
    const fromEl=body.querySelector('#recNewFrom');
    const toEl=body.querySelector('#recNewTo');
    if(modeEl)modeEl.onchange=()=>{
      nf.mode=modeEl.value;
      if(nf.mode==='range'){
        nf.from=recDaysAgoKey(6);
        nf.to=calendarDayKey(new Date());
        nf._userSet=true;
        recApplyGlobalFilter(nf);
        recRenderLogBody(); return;
      }
      recApplyGlobalFilter(nf);
      body.querySelector('#recNewDay').style.display=nf.mode==='day'?'':'none';
      body.querySelector('#recNewRange').style.display=nf.mode==='range'?'':'none';
      syncNewFilter();
    };
    if(dayEl)dayEl.onchange=()=>{nf.day=dayEl.value;recApplyGlobalFilter(nf);syncNewFilter()};
    if(fromEl)fromEl.onchange=()=>{nf.from=fromEl.value;nf._userSet=true;recApplyGlobalFilter(nf);syncNewFilter()};
    if(toEl)toEl.onchange=()=>{nf.to=toEl.value;nf._userSet=true;recApplyGlobalFilter(nf);syncNewFilter()};
    syncNewFilter();
  } else {
    // Individual panel filter bindings (still global: any change propagates everywhere)
    showPanels.forEach(p=>{
      const fk=S.recFilters[p.id];
      const modeEl=body.querySelector(`[data-rfm="${p.id}"]`);
      const dayEl=body.querySelector(`[data-rfday="${p.id}"]`);
      const fromEl=body.querySelector(`[data-rffrom="${p.id}"]`);
      const toEl=body.querySelector(`[data-rfto="${p.id}"]`);
      if(modeEl)modeEl.onchange=()=>{
        fk.mode=modeEl.value;
        if(fk.mode==='range'){
          fk.from=recDaysAgoKey(6);
          fk.to=calendarDayKey(new Date());
        }
        recApplyGlobalFilter(fk);
        recRenderLogBody();
      };
      if(dayEl)dayEl.onchange=()=>{fk.day=dayEl.value;recApplyGlobalFilter(fk);recRenderTable(p.id)};
      if(fromEl)fromEl.onchange=()=>{fk.from=fromEl.value;recApplyGlobalFilter(fk);recRenderTable(p.id)};
      if(toEl)toEl.onchange=()=>{fk.to=toEl.value;recApplyGlobalFilter(fk);recRenderTable(p.id)};
      recRenderTable(p.id);
    });
    if(showSleep){
      const sf=S.recFilters['sleep']||(S.recFilters['sleep']={mode:'day',day:today});
      const syncSleepFilter=()=>{
        const sd=sf.mode==='day'?(sf.day||today):(sf.from||today);
        recRenderSleepSection(body.querySelector('#recSleepWrap'),sd,sf.mode,sf.from,sf.to);
      };
      const smEl=body.querySelector('#recSleepMode');
      const sdEl=body.querySelector('#recSleepDayVal');
      const sfEl=body.querySelector('#recSleepFrom');
      const stEl=body.querySelector('#recSleepTo');
      if(smEl)smEl.onchange=()=>{
        sf.mode=smEl.value;
        if(sf.mode==='range'){
          sf.from=recDaysAgoKey(6);
          sf.to=calendarDayKey(new Date());
        }
        recApplyGlobalFilter(sf);
        recRenderLogBody();
      };
      if(sdEl)sdEl.onchange=()=>{sf.day=sdEl.value;recApplyGlobalFilter(sf);syncSleepFilter()};
      if(sfEl)sfEl.onchange=()=>{sf.from=sfEl.value;recApplyGlobalFilter(sf);syncSleepFilter()};
      if(stEl)stEl.onchange=()=>{sf.to=stEl.value;recApplyGlobalFilter(sf);syncSleepFilter()};
      syncSleepFilter();
    }
  }
}

const SLEEP_KINDS_ARR=[{value:'sleep',label:'睡眠'},{value:'stayed_up',label:'熬穿了'},{value:'lazy',label:'賴床'},{value:'nap',label:'小睡'}];

function recRenderSleepSection(wrap,today,filterMode,fromDay,toDay){
  if(!wrap)return;
  // Cross-day sleep dedup: belongs to the day its endAt falls in (wake-up day).
  // For entries without endAt, fall back to startAt's logical day.
  const matchDay=d=>{
    if(filterMode==='range') return d>=(fromDay||'')&&d<=(toDay||'9');
    return d===today;
  };
  const entries=logsFor('sleep').filter(e=>{
    if(e.endAt){return matchDay(computeLogicalDay(e.endAt))}
    if(e.startAt){return matchDay(computeLogicalDay(e.startAt))}
    const ld=e.executiveDate||e.logicalDay||'';
    return matchDay(ld);
  }).slice().sort((a,b)=>{
    const ta=a.startAt||a.executiveTime||'',tb=b.startAt||b.executiveTime||'';
    return ta<tb?-1:ta>tb?1:0;
  });
  const weatherFor=(day)=>{
    const w=logsFor('weather').find(x=>x.executiveDate===day||x.logicalDay===day);
    return w?(w.value||w.weather||'＋'):'＋';
  };
  const wDisplay=weatherFor(today);
  const KINDS={sleep:'睡眠',stayed_up:'熬穿了',lazy:'賴床',nap:'小睡'};

  // In day mode the header has the global weather button. In range mode,
  // per-day weather buttons are placed inside each day's divider instead.
  let header='';
  if(filterMode!=='range'){
    header=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px">
      <button data-sleep-add style="border:1px solid var(--border);background:transparent;border-radius:6px;padding:4px 10px;cursor:pointer;font:inherit;font-size:12px;color:var(--text2)">＋ 補登</button>
      <button data-weather-edit data-weather-day="${escH(today)}" style="border:1px solid var(--border);background:transparent;border-radius:6px;padding:4px 10px;cursor:pointer;font:inherit;font-size:14px">天氣 ${escH(wDisplay)}</button>
    </div>`;
  }else{
    header=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px">
      <button data-sleep-add style="border:1px solid var(--border);background:transparent;border-radius:6px;padding:4px 10px;cursor:pointer;font:inherit;font-size:12px;color:var(--text2)">＋ 補登</button>
    </div>`;
  }

  const entryDayKey=e=>{
    if(e.endAt)return computeLogicalDay(e.endAt);
    if(e.startAt)return computeLogicalDay(e.startAt);
    return e.executiveDate||e.logicalDay||'';
  };
  const rowHtml=e=>{
    const kind=KINDS[e.kind]||e.kind||'睡眠';
    const dayRef=entryDayKey(e)||today;
    const t1=e.startAt?markNextDay(fmtT(new Date(e.startAt)),e.startAt,dayRef):'';
    const t2=e.endAt?markNextDay(fmtT(new Date(e.endAt)),e.endAt,dayRef):'';
    const range=t1&&t2?t1+'～'+t2:e.executiveTimeLabel||'';
    const mins=e.startAt&&e.endAt?Math.round((new Date(e.endAt)-new Date(e.startAt))/60000):0;
    const dur=mins>0?Math.floor(mins/60)+'h'+pad(mins%60)+'m':'—';
    const hasNotes=e.kind==='sleep'||e.kind==='stayed_up'||!e.kind;
    const notesText=hasNotes&&e.notes?escH(e.notes):'—';
    return `<tr><td>${escH(kind)}</td><td>${escH(range)}</td><td>${escH(dur)}</td><td>${escH(e.quality||'—')}</td><td style="max-width:200px;white-space:normal;word-break:break-word">${notesText}</td>
      <td><div class="row-acts">
        <button data-sedit="${e.id}" title="編輯"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button>
        <button data-sdel="${e.id}" title="刪除"><svg viewBox="0 0 24 24"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M8 7l1 12h6l1-12"/></svg></button>
      </div></td></tr>`;
  };
  const thead='<thead><tr><th>類型</th><th>時間</th><th>時長</th><th>品質</th><th>備註</th><th></th></tr></thead>';

  let tbl;
  if(filterMode==='range'){
    // For range mode: union of days with entries AND days in the picked range
    const dayKeysWithEntries=new Set(entries.map(entryDayKey).filter(Boolean));
    // Also include every day in fromDay..toDay (so we can show weather even if no sleep)
    const rangeDays=[];
    if(fromDay&&toDay){
      try{
        const start=new Date(fromDay+'T00:00:00');
        const end=new Date(toDay+'T00:00:00');
        const d=new Date(start);
        while(d<=end){ rangeDays.push(calendarDayKey(d)); d.setDate(d.getDate()+1); }
      }catch{}
    }
    const allDays=Array.from(new Set([...rangeDays,...dayKeysWithEntries])).sort();
    if(!allDays.length){
      tbl='<div style="color:var(--text4);font-size:12px;padding:8px 0">暫無睡眠紀錄</div>';
    }else{
      const grouped=new Map();
      entries.forEach(e=>{const k=entryDayKey(e);if(!grouped.has(k))grouped.set(k,[]);grouped.get(k).push(e)});
      tbl='';
      allDays.forEach(day=>{
        const wDisp=weatherFor(day);
        tbl+=`<div class="rec-day-divider" style="display:flex;align-items:center;justify-content:space-between;padding:0 4px"><span>${escH(day||'—')}</span><button data-weather-edit data-weather-day="${escH(day)}" style="border:1px solid var(--border);background:transparent;border-radius:6px;padding:3px 8px;cursor:pointer;font:inherit;font-size:13px;color:var(--text2)">天氣 ${escH(wDisp)}</button></div>`;
        const rs=grouped.get(day)||[];
        if(rs.length) tbl+=`<div class="rec-day-group"><table class="rec-tbl">${thead}<tbody>${rs.map(rowHtml).join('')}</tbody></table></div>`;
        else tbl+=`<div class="rec-day-group" style="color:var(--text4);font-size:11px;padding:6px 4px">暫無紀錄</div>`;
      });
    }
  }else if(!entries.length){
    tbl='<div style="color:var(--text4);font-size:12px;padding:8px 0">暫無睡眠紀錄</div>';
  }else{
    tbl=`<table class="rec-tbl">${thead}<tbody>${entries.map(rowHtml).join('')}</tbody></table>`;
  }
  wrap.innerHTML=header+tbl;
  const addBtn=wrap.querySelector('[data-sleep-add]');if(addBtn)addBtn.onclick=()=>recOpenSleepEdit(null,today);
  wrap.querySelectorAll('[data-weather-edit]').forEach(b=>{b.onclick=()=>recOpenWeatherEdit(b.dataset.weatherDay||today)});
  wrap.querySelectorAll('[data-sedit]').forEach(b=>b.onclick=()=>recOpenSleepEdit(b.dataset.sedit,today));
  wrap.querySelectorAll('[data-sdel]').forEach(b=>b.onclick=()=>{deleteLog(b.dataset.sdel);recRenderLogBody()});
}

function recOpenSleepEdit(entryId,day){
  // Close any existing sub-edit overlay but keep the logtable open
  if(_recEditOv){_recEditOv.remove();_recEditOv=null;}
  const existing=entryId?S.logs.find(l=>l.id===entryId):null;
  const data=existing?{...existing}:{kind:'sleep',startAt:new Date().toISOString(),endAt:new Date().toISOString(),quality:'',notes:''};
  const fmtDtL=iso=>{if(!iso)return'';const d=new Date(iso);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())};
  const ov=document.createElement('div');ov.className='rec-mo';
  ov.addEventListener('click',e=>{if(e.target===ov)recDismiss()});
  const box=document.createElement('div');box.className='rec-mo-box';

  const captureInputs=()=>{
    const s=document.getElementById('sleep_start');
    const en=document.getElementById('sleep_end');
    const q=document.getElementById('sleep_quality');
    const n=document.getElementById('sleep_notes');
    if(s&&s.value){try{data.startAt=new Date(s.value).toISOString()}catch{}}
    if(en&&en.value){try{data.endAt=new Date(en.value).toISOString()}catch{}}
    if(q)data.quality=q.value;
    if(n)data.notes=n.value;
  };

  const buildBody=()=>{
    const hasQuality=data.kind==='sleep';
    const hasNotes=data.kind==='sleep'||data.kind==='stayed_up';
    const dateFieldStyle='display:flex;flex-direction:column;gap:4px';
    const dateLabelStyle='text-align:left;padding:0;font-size:12px;color:var(--text3)';
    return `<div class="rec-mo-title"><span>${existing?'編輯睡眠紀錄':'新增睡眠紀錄'}</span><button class="rec-close" data-rx>×</button></div>
      <form class="rec-fg" id="sleepEditForm">
        <div class="span2"><label>項目</label><select id="sleep_kind">${SLEEP_KINDS_ARR.map(k=>`<option value="${k.value}"${data.kind===k.value?' selected':''}>${k.label}</option>`).join('')}</select></div>
        ${data.kind!=='stayed_up'?`<div class="span2" style="${dateFieldStyle}"><label style="${dateLabelStyle}">開始時間</label><input type="datetime-local" id="sleep_start" value="${fmtDtL(data.startAt)}" style="width:100%"/></div>`:''}
        <div class="span2" style="${dateFieldStyle}"><label style="${dateLabelStyle}">${data.kind==='stayed_up'?'放棄時間':'結束時間'}</label><input type="datetime-local" id="sleep_end" value="${fmtDtL(data.endAt)}" style="width:100%"/></div>
        ${hasQuality?`<div class="span2"><label>睡眠質量</label><select id="sleep_quality"><option value="">（未選）</option>${SLEEP_QUALITY_OPTIONS.map(q=>`<option value="${q}"${data.quality===q?' selected':''}>${q}</option>`).join('')}</select></div>`:''}
        ${hasNotes?`<div class="span2"><label>備註</label><textarea id="sleep_notes" rows="3" placeholder="夢境、感受、任何想記的事">${escH(data.notes||'')}</textarea></div>`:''}
      </form>
      <div class="rec-acts">
        ${existing?'<button type="button" data-sx-del>刪除</button>':''}
        <button type="button" data-rx>取消</button>
        <button type="button" class="pri" data-sx-save>保存</button>
      </div>`;
  };

  const wireForm=()=>{
    box.querySelectorAll('[data-rx]').forEach(b=>b.onclick=recDismiss);
    const kindSel=document.getElementById('sleep_kind');
    if(kindSel)kindSel.onchange=()=>{captureInputs();data.kind=kindSel.value;box.innerHTML=buildBody();wireForm()};
    const delBtn=box.querySelector('[data-sx-del]');
    if(delBtn)delBtn.onclick=()=>{deleteLog(existing.id);recDismiss();recRenderLogBody()};
    box.querySelector('[data-sx-save]').onclick=()=>{
      captureInputs();
      const kind=data.kind;
      const startDate=(kind==='stayed_up')?null:(data.startAt?new Date(data.startAt):new Date());
      const endDate=data.endAt?new Date(data.endAt):new Date();
      const logicalDay=calendarDayKey(endDate);
      const payload={
        id:existing?existing.id:uid(),
        kind,
        startAt:startDate?startDate.toISOString():null,
        endAt:endDate.toISOString(),
        quality:(kind==='sleep')?(data.quality||''):'',
        notes:(kind==='sleep'||kind==='stayed_up')?(data.notes||''):'',
        logicalDay,
        executiveDate:logicalDay,
        executiveTime:fmtDtL(endDate.toISOString()),
        executiveTimeLabel:fmt(endDate),
        createdAt:existing?existing.createdAt:Date.now()
      };
      if(existing){updateLog(existing.id,payload)}
      else{addLog('sleep',payload)}
      recDismiss();
      recRenderLogBody();
    };
  };

  box.innerHTML=buildBody();
  ov.appendChild(box);document.body.appendChild(ov);_recEditOv=ov;
  wireForm();
}

function recOpenWeatherEdit(day){
  if(_recEditOv){_recEditOv.remove();_recEditOv=null;}
  const targetDay=day||getActiveLogicalDay();
  const wEntry=logsFor('weather').find(w=>w.executiveDate===targetDay||w.logicalDay===targetDay);
  const current=wEntry?(wEntry.value||wEntry.weather||''):'';
  const STICKERS=(typeof WEATHER_STICKERS!=='undefined')?WEATHER_STICKERS:['☀️','⛅️','☁️','🍃','🌬','🌦','🌧','⛈️'];
  const ov=document.createElement('div');ov.className='rec-mo';
  ov.addEventListener('click',e=>{if(e.target===ov)recDismiss()});
  const box=document.createElement('div');box.className='rec-mo-box';
  box.innerHTML=`<div class="rec-mo-title"><span>選擇天氣 · ${escH(targetDay)}</span><button class="rec-close" data-rx>×</button></div>
    <div class="rec-fg" style="padding:14px 0">
      <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center">
        ${STICKERS.map(s=>`<button type="button" data-w="${escH(s)}" style="font-size:24px;padding:10px 14px;border:1px solid ${s===current?'var(--accent)':'var(--border)'};background:${s===current?'rgba(178,158,210,0.15)':'transparent'};border-radius:12px;cursor:pointer">${escH(s)}</button>`).join('')}
      </div>
    </div>
    <div class="rec-acts">
      ${current?'<button type="button" data-w-clear>清除天氣</button>':''}
      <button type="button" data-rx>取消</button>
    </div>`;
  ov.appendChild(box);document.body.appendChild(ov);_recEditOv=ov;
  box.querySelectorAll('[data-rx]').forEach(b=>b.onclick=recDismiss);
  box.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>{
    const v=b.dataset.w;
    if(wEntry){updateLog(wEntry.id,{value:v,weather:v})}
    else{addLog('weather',{id:uid(),value:v,weather:v,executiveDate:targetDay,logicalDay:targetDay,createdAt:Date.now()})}
    recDismiss();
    recRenderLogBody();
  });
  const clearBtn=box.querySelector('[data-w-clear]');
  if(clearBtn)clearBtn.onclick=()=>{
    if(wEntry)deleteLog(wEntry.id);
    recDismiss();
    recRenderLogBody();
  };
}

function recOpenHwTimeEdit(cat,id){
  const it=(S.items[cat]||[]).find(x=>x.id===id);
  if(!it)return;
  recDismiss();
  const fmtDtL=iso=>{if(!iso)return'';const d=new Date(iso);const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes())};

// ── 服藥計畫 modal ─────────────────────────────────────────────
function openMedScheduleModal(){
  if(_recEditOv){_recEditOv.remove();_recEditOv=null;}
  const ov=document.createElement('div');ov.className='rec-mo';
  ov.addEventListener('click',e=>{if(e.target===ov)recDismiss()});

  ov.appendChild(box); document.body.appendChild(ov); _recEditOv=ov;
  // Edit state for the inline form. null = list view.
  let editing=null;
  const TYPES=['藥劑','補品','功能性食物'];
  const DAY_LABELS=['日','一','二','三','四','五','六'];
  const dayLabel=(idx)=>DAY_LABELS[idx];
  const blank=()=>({
    id:uid(),
    drugName:'',
    drugType:'藥劑',
    frequencyMode:'daily',
    dailyTimes:1,
    weeklyDays:[],
    startDate:calendarDayKey(new Date()),
    endDate:''
  });
  const tagsFor=(type)=>{
    const grp='nutrients_name'+(type?'_'+type:'');
    return (S.rtags[grp]||[]).slice().sort((a,b)=>a.localeCompare(b,'zh-Hant'));
  };
  function render(){
    box.innerHTML='';
    const head=document.createElement('div');head.className='rec-mo-title';
    head.innerHTML='<span>服藥計畫</span><button class="rec-close" data-rx>×</button>';

      renderEdit(body);
    } else {
      renderList(body);
    }

  function renderList(body){
    const schedules=getMedSchedules();
    if(!schedules.length){
      body.appendChild(h('div',{cn:'soft-note',st:{padding:'14px 6px',textAlign:'center',color:'var(--text4)'}},'尚無服藥計畫'));
    } else {
      schedules.forEach(sch=>{
        const row=h('div',{st:{display:'flex',flexDirection:'column',gap:'4px',padding:'10px 12px',border:'1px solid var(--border2)',borderRadius:'12px',marginBottom:'8px',background:'rgba(255,255,255,.42)'}});
        const top=h('div',{st:{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:'8px'}});
        top.appendChild(h('div',{st:{fontSize:'13px',color:'var(--text)'}},(sch.drugName||'(未命名)')+'  ',h('span',{st:{fontSize:'10px',color:'var(--text4)'}},'· '+(sch.drugType||''))));

        acts.appendChild(h('button',{cn:'btn-i',html:I.trash,title:'刪除',onClick:()=>{
          S.workspace.medSchedules=getMedSchedules().filter(x=>x.id!==sch.id);
          __dirty.workspace=true; if(typeof queuePersist==='function')queuePersist();
          render();
        },st:{width:'24px',height:'24px'}}));
        top.appendChild(acts);
        row.appendChild(top);
        // Freq summary
        let freq='';
        if(sch.frequencyMode==='weekly'){
          const days=(Array.isArray(sch.weeklyDays)?sch.weeklyDays:[]).slice().sort();
          freq='每週 '+(days.length?days.map(dayLabel).join('・'):'未選')+'';
        } else {
          freq='每天 '+(sch.dailyTimes||1)+' 次';
        }
        const range=(sch.startDate||'?')+' → '+(sch.endDate||'未設');
        row.appendChild(h('div',{st:{fontSize:'11px',color:'var(--text3)'}},freq+' · '+range));
        body.appendChild(row);
      });

    const e=editing;
    const fg=h('div',{cn:'rec-fg'});

    typeRow.appendChild(h('label',null,'類別'));
    const typeSel=h('select',null);
    TYPES.forEach(t=>typeSel.appendChild(h('option',{value:t,selected:e.drugType===t},t)));
    typeSel.onchange=()=>{ e.drugType=typeSel.value; renderDrugDatalist(); };
    typeRow.appendChild(typeSel);
    fg.appendChild(typeRow);
    // Drug name (autocomplete from tag group, allows new value)
    const nameRow=h('div',{cn:'span2'});
    nameRow.appendChild(h('label',null,'藥物名'));
    const dlId='medSchedDl-'+e.id;
    const nameInp=h('input',{type:'text',value:e.drugName||'',placeholder:'例如：維生素B群',list:dlId});
    nameInp.oninput=()=>{ e.drugName=nameInp.value.trim(); };
    nameRow.appendChild(nameInp);
    const dl=h('datalist',{id:dlId});
    nameRow.appendChild(dl);
    function renderDrugDatalist(){
      dl.innerHTML='';
      tagsFor(e.drugType).forEach(t=>dl.appendChild(h('option',{value:t})));
    }
    renderDrugDatalist();
    fg.appendChild(nameRow);
    // Frequency mode
    const modeRow=h('div',{cn:'span2'});
    modeRow.appendChild(h('label',null,'頻率類型'));
    const modeSel=h('select',null);
    [['daily','每天'],['weekly','每週']].forEach(([v,l])=>modeSel.appendChild(h('option',{value:v,selected:e.frequencyMode===v},l)));
    modeSel.onchange=()=>{ e.frequencyMode=modeSel.value; render(); };
    modeRow.appendChild(modeSel);
    fg.appendChild(modeRow);
    // Daily times OR weekly days
    if(e.frequencyMode==='daily'){
      const dRow=h('div',{cn:'span2'});
      dRow.appendChild(h('label',null,'每天次數'));
      const dSel=h('select',null);
      [1,2,3].forEach(n=>dSel.appendChild(h('option',{value:String(n),selected:Number(e.dailyTimes)===n},n+' 次/天')));
      dSel.onchange=()=>{ e.dailyTimes=Number(dSel.value); };
      dRow.appendChild(dSel);
      fg.appendChild(dRow);
    } else {
      const wRow=h('div',{cn:'span2'});
      wRow.appendChild(h('label',null,'每週執行日'));
      const wWrap=h('div',{st:{display:'flex',gap:'6px',flexWrap:'wrap'}});
      [0,1,2,3,4,5,6].forEach(i=>{
        const isOn=Array.isArray(e.weeklyDays)&&e.weeklyDays.includes(i);
        const chip=h('button',{type:'button',st:{
          padding:'6px 10px',borderRadius:'999px',border:'1px solid var(--border)',
          background:isOn?'rgba(178,158,210,0.22)':'rgba(255,255,255,.5)',
          color:isOn?'var(--text)':'var(--text3)',cursor:'pointer',font:'inherit',fontSize:'11px',minWidth:'30px'
        },onClick:()=>{
          if(!Array.isArray(e.weeklyDays)) e.weeklyDays=[];
          const idx=e.weeklyDays.indexOf(i);
          if(idx>=0) e.weeklyDays.splice(idx,1); else e.weeklyDays.push(i);
          render();
        }},dayLabel(i));
        wWrap.appendChild(chip);
      });
      wRow.appendChild(wWrap);
      fg.appendChild(wRow);
    }
    // Start / End date
    const dateRow=h('div',{cn:'span2',st:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}});
    const sCol=h('div'); sCol.appendChild(h('label',null,'開始日期'));
    const sInp=h('input',{type:'date',value:e.startDate||''}); sInp.onchange=()=>{e.startDate=sInp.value;};
    sCol.appendChild(sInp); dateRow.appendChild(sCol);
    const eCol=h('div'); eCol.appendChild(h('label',null,'結束日期'));
    const eInp=h('input',{type:'date',value:e.endDate||''}); eInp.onchange=()=>{e.endDate=eInp.value;};
    eCol.appendChild(eInp); dateRow.appendChild(eCol);
    fg.appendChild(dateRow);
    body.appendChild(fg);
    // Actions
    const acts=h('div',{cn:'rec-acts',st:{marginTop:'16px'}});
    acts.appendChild(h('button',{type:'button',onClick:()=>{editing=null;render();}},'取消'));

      if(!e.drugName){ alert('請填寫藥物名'); return; }
      // Ensure the drug name is registered as a tag in the right sub-group
      try{
        const grp='nutrients_name_'+e.drugType;
        recEnsureTag(grp,e.drugName);
      }catch{}
      // Upsert
      const list=getMedSchedules();
      const idx=list.findIndex(x=>x.id===e.id);
      const payload={
        id:e.id,
        drugName:e.drugName,
        drugType:e.drugType,
        frequencyMode:e.frequencyMode,
        dailyTimes:Number(e.dailyTimes||1),
        weeklyDays:Array.isArray(e.weeklyDays)?e.weeklyDays.slice():[],
        startDate:e.startDate||'',
        endDate:e.endDate||''
      };
      if(idx>=0) list[idx]=payload; else list.push(payload);
      __dirty.workspace=true; if(typeof queuePersist==='function')queuePersist();
      editing=null;
      render();
    }},'保存'));
    body.appendChild(acts);
  }
  render();
}

    recRenderLogBody();

    const hh=Number(document.getElementById('wsH').value||0);

    const newMs=Math.max(0,hh*3600000+mm*60000+ss*1000);
    const progDelta=Number(document.getElementById('wsProg').value||0);
    const interrupts=Number(document.getElementById('wsInt').value||0);

    S.workspace.workSessions=(S.workspace.workSessions||[]).map(s=>{
      if(s.id!==sessionId)return s;
      const patch={...s,durationMs:newMs,mins:Math.round(newMs/60000),mood:newMoods,interruptions:interrupts};
      if(newStartAt)patch.startAt=newStartAt;
      if(newEndAt)patch.endAt=newEndAt;
      if(Number.isFinite(progDelta))patch.progressDelta=progDelta;
      return patch;
    });
    if(typeof wsSave==='function')wsSave();
    recDismiss();
    recRenderLogBody();
  };
}

// ── Inventory log (food only: fresh + pantry) ──
function recRenderInventorySection(wrap,today){
  if(!wrap)return;
  const now=new Date();
  const catLabel={fresh:'生鮮果蔬',pantry:'存糧調料'};
  const items=[];
  ['fresh','pantry'].forEach(cat=>{
    (S.items[cat]||[]).filter(it=>!it.archived&&it.type==='expiry').forEach(it=>{
      items.push({...it,_cat:cat});
    });
  });
  const groups={today:[],normal:[],warning:[],expired:[]};
  items.forEach(it=>{
    const isToday=it.purchasedAt&&computeLogicalDay(it.purchasedAt)===today;
    const status=exS(it,now);
    let g;
    if(isToday)g='today';
    else if(status.st==='red')g='expired';
    else if(status.st==='orange')g='warning';
    else g='normal';
    groups[g].push({...it,_status:status});
  });
  groups.today.sort((a,b)=>new Date(b.purchasedAt||0)-new Date(a.purchasedAt||0));
  groups.normal.sort((a,b)=>new Date(a.expiryDate||0)-new Date(b.expiryDate||0));
  groups.warning.sort((a,b)=>new Date(a.expiryDate||0)-new Date(b.expiryDate||0));
  groups.expired.sort((a,b)=>new Date(b.expiryDate||0)-new Date(a.expiryDate||0));

  const allRows=[
    ...groups.today.map(it=>({...it,_g:'今日新增',_color:''})),
    ...groups.normal.map(it=>({...it,_g:'正常在庫',_color:''})),
    ...groups.warning.map(it=>({...it,_g:'臨近過期',_color:'#c89000'})),
    ...groups.expired.map(it=>({...it,_g:'已經過期',_color:'#c44'}))
  ];
  if(!allRows.length){wrap.innerHTML='<div style="color:var(--text4);font-size:12px;padding:8px 0">暫無在庫項目</div>';return}
  let tbl='<table class="rec-tbl"><thead><tr><th>狀態</th><th>名稱</th><th>類型</th><th>狀態</th></tr></thead><tbody>';
  allRows.forEach(r=>{
    const remaining=r._status.left;
    let timeText;
    if(remaining>0)timeText=`還有 ${remaining} 天`;
    else if(remaining===0)timeText='今日到期';
    else timeText=`過期 ${-remaining} 天`;
    const cs=r._color?`color:${r._color};font-weight:500`:'';
    tbl+=`<tr style="${cs}"><td>${escH(r._g)}</td><td>${escH(r.name||'')}</td><td>${escH(catLabel[r._cat]||'')}</td><td>${escH(timeText)}</td></tr>`;
  });
  tbl+='</tbody></table>';
  wrap.innerHTML=tbl;
}

// ── Housework log (kitchen + living + garbage) ──
function recRenderHouseworkSection(wrap,today,filterMode,fromDay,toDay){
  if(!wrap)return;
  const now=new Date();
  const catLabel={kitchen:'廚房衛浴',living:'居室生活',garbage:'垃圾分類'};
  const allHw=[];
  ['kitchen','living','garbage'].forEach(cat=>{
    (S.items[cat]||[]).forEach(it=>{
      // Include archived cards too — seedcards archive on completion but should still show in housework log
      allHw.push({...it,_cat:cat});
    });
  });

  // ── Table 1: completed today (every completion event, not just latest) ──
  // Helper: build the per-day block (window row + completion rows)
  const buildDayBlock=(day)=>{
    const completedThatDay=[];
    allHw.forEach(it=>{
      const hist=Array.isArray(it.doneHistory)?it.doneHistory.slice():null;
      if(hist&&hist.length){
        hist.forEach(at=>{ if(at&&computeLogicalDay(at)===day) completedThatDay.push({...it, _at:at, _isLast:at===hist[hist.length-1]}); });
      }else if(it.lastDoneAt&&computeLogicalDay(it.lastDoneAt)===day){
        completedThatDay.push({...it, _at:it.lastDoneAt, _isLast:true});
      }
    });
    completedThatDay.sort((a,b)=>new Date(a._at)-new Date(b._at));
    const wEntry=logsFor('window_open').find(w=>w.executiveDate===day||w.logicalDay===day);
    const wRawTime=wEntry?(wEntry.executiveTimeLabel||wEntry.executiveTime||''):'';
    const wTimeText=wEntry?markNextDay(wRawTime||'今日',wEntry.executiveTime,day):'';
    const wDoneStatus=wEntry?'已開窗通風':'<span style="color:var(--text4)">尚未開窗</span>';
    const wActs=`<div class="row-acts"><button data-hw-edit-window="${day}" title="${wEntry?'編輯時間':'補登開窗'}"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button></div>`;
    let body=`<tr style="background:rgba(178,158,210,0.06)"><td>${escH(wTimeText)||'—'}</td><td>${wDoneStatus}</td><td>${wActs}</td></tr>`;
    completedThatDay.forEach(it=>{
      const t=markNextDay(fmtT(new Date(it._at)),it._at,day);
      const canUndo=(it._isLast&&it._undoBefore)?'':'disabled style="opacity:.35;pointer-events:none"';
      const acts=it._isLast?`<div class="row-acts">
        <button data-hw-edit="${it._cat}|${it.id}" title="編輯時間"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button>
        <button data-hw-undo="${it._cat}|${it.id}" title="撤銷完成" ${canUndo}><svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg></button>
      </div>`:'';
      body+=`<tr><td>${escH(t)}</td><td>${escH((catLabel[it._cat]||'')+'：'+(it.name||''))}</td><td>${acts}</td></tr>`;
    });
    return `<table class="rec-tbl"><thead><tr><th>時間</th><th>完成項目</th><th></th></tr></thead><tbody>${body}</tbody></table>`;
  };

  let html='<div style="font-size:12px;color:var(--text3);margin-bottom:6px">當日完成的項目（當天有完成動作的項目）</div>';
  if(filterMode==='range'){
    const f=fromDay||today, t=toDay||today;
    const rangeDays=[];
    try{
      const start=new Date(f+'T00:00:00');
      const end=new Date(t+'T00:00:00');
      const d=new Date(start);
      while(d<=end){ rangeDays.push(calendarDayKey(d)); d.setDate(d.getDate()+1); }
    }catch{}
    if(!rangeDays.length) rangeDays.push(today);
    rangeDays.forEach((day,idx)=>{
      const divStyle=idx===0?'margin-top:4px':'';
      html+=`<div class="rec-day-divider" style="${divStyle}"><span>${escH(day)}</span></div>`;
      html+=`<div class="rec-day-group">${buildDayBlock(day)}</div>`;
    });
  } else {
    html+=buildDayBlock(today);
  }

  // ── Table 2: accumulated (yellow/orange/red) ──
  const accumulated=[];
  allHw.forEach(it=>{
    if(it.archived)return;
    let status,delayText,ultText;
    if(it.type==='cycle'){
      status=cyS(it,now);
      if(!['yellow','orange','red'].includes(status.st))return;
      const unit=it.periodUnit==='hours'?'小時':'天';
      const d=status.d;
      const cycleX=Number(it.cycleX||0);
      const warnZ=Number(it.warnZ||0);
      const overdue=Math.max(0,d-cycleX);
      delayText=`${overdue} ${unit}`+(overdue===0?'（接近）':'');
      const toRed=warnZ-d;
      ultText=toRed>0?`還有 ${toRed} ${unit}`:'已逾期';
    }else if(it.type==='garbage'){
      status=garbageS(it,now);
      if(!['yellow','orange','red'].includes(status.st))return;
      const X=Number(it.limitX||0);
      const Z=Number(it.warnZ||0);
      const cnt=Number(it.count||0);
      const T=Math.max(1,Number(it.cycleDays||0)||1);
      // Delay time: from when count crossed X. Tracked in xReachedAt.
      let daysSinceX,cycleIdx;
      if(it.xReachedAt){
        daysSinceX=Math.max(0,dayD(now,new Date(it.xReachedAt)));
        cycleIdx=Math.floor(daysSinceX/T)+1;
        delayText=`${daysSinceX} 天（正在第 ${cycleIdx} 個週期）`;
      }else{
        // No tracking — fall back to elapsed since lastDoneAt as approximation
        const last=new Date(it.lastDoneAt);
        const elapsed=Math.max(0,dayD(now,last));
        delayText=`${elapsed} 天`;
      }
      // Last warning: distance to Z (red threshold)
      const remainingToZ=Math.max(0,Z-cnt);
      // Distance to next valid cycle day (when you can do the task)
      const last=new Date(it.lastDoneAt);
      const elapsed=Math.max(0,dayD(now,last));
      const toNext=elapsed%T===0?0:T-(elapsed%T);
      ultText=`還有 ${remainingToZ} 個 ｜ 距離下個執行日還有 ${toNext} 天`;
    }else if(it.type==='wetGarbage'){
      status=wetGarbageS(it,now);
      if(!['yellow','red'].includes(status.st))return;
      delayText=status.doneInCycle?'已完成':'未完成';
      ultText=`距離收集日 ${status.nextNum} 天`;
    }else return;
    accumulated.push({it,status,delayText,ultText});
  });
  const sevOrder={red:0,orange:1,yellow:2};
  accumulated.sort((a,b)=>(sevOrder[a.status.st]||9)-(sevOrder[b.status.st]||9));

  html+='<div style="font-size:12px;color:var(--text3);margin:14px 0 6px">堆積項目（已經進入橙色提醒的項目）</div>';
  if(!accumulated.length){
    html+='<div style="color:var(--text4);font-size:12px;padding:8px 0">暫無堆積項目</div>';
  }else{
    html+='<table class="rec-tbl"><thead><tr><th>堆積項目</th><th>拖延時間</th><th>最後通牒</th></tr></thead><tbody>';
    accumulated.forEach(r=>{
      const cs=r.status.st==='red'?'color:#c44':r.status.st==='orange'?'color:#c89000':'';
      html+=`<tr style="${cs}"><td>${escH((catLabel[r.it._cat]||'')+'：'+(r.it.name||''))}</td><td>${escH(r.delayText)}</td><td>${escH(r.ultText)}</td></tr>`;
    });
    html+='</tbody></table>';
  }
  wrap.innerHTML=html;
  // Wire action buttons
  wrap.querySelectorAll('[data-hw-edit-window]').forEach(b=>{
    b.onclick=(ev)=>{ev.stopPropagation();recOpenWindowTimeEdit(b.dataset.hwEditWindow||today);};
  });
  wrap.querySelectorAll('[data-hw-edit]').forEach(b=>{
    b.onclick=(ev)=>{
      ev.stopPropagation();
      const [cat,id]=String(b.dataset.hwEdit).split('|');
      recOpenHwTimeEdit(cat,id);
    };
  });
  wrap.querySelectorAll('[data-hw-undo]').forEach(b=>{
    b.onclick=(ev)=>{
      ev.stopPropagation();
      const [cat,id]=String(b.dataset.hwUndo).split('|');
      const it=(S.items[cat]||[]).find(x=>x.id===id);
      if(!it||!it._undoBefore)return;
      const before=it._undoBefore;
      S.items[cat]=S.items[cat].map(x=>{
        if(x.id!==id)return x;
        const restored={...x};
        if('lastDoneAt' in before)restored.lastDoneAt=before.lastDoneAt;
        if('count' in before)restored.count=before.count;
        if('xReachedAt' in before)restored.xReachedAt=before.xReachedAt;
        if('doneHistory' in before)restored.doneHistory=before.doneHistory;
        delete restored._undoBefore;
        return restored;
      });
      itemsSave();
      recRenderLogBody();
    };
  });
}

// ── Work log (sessions + projects) ──
function recRenderWorkSection(wrap,today,filterMode,fromDay,toDay){
  if(!wrap)return;
  const now=new Date();

  // ── Table 1: work sessions for today (or filter range) ──
  const sessions=(S.workspace.workSessions||[]).filter(s=>{
    const k=computeLogicalDay(s.startAt||s.endAt);
    if(filterMode==='range')return k>=(fromDay||'')&&k<=(toDay||'9');
    return k===today;
  });
  sessions.sort((a,b)=>new Date(a.startAt||0)-new Date(b.startAt||0));

  const thead='<thead><tr><th>時間</th><th>工作文件</th><th>專注時間</th><th>推進進度</th><th>中斷次數</th><th>工作心情</th><th></th></tr></thead>';
  const sessionDayKey=s=>computeLogicalDay(s.startAt||s.endAt);
  const sessionRow=(s,dayRef)=>{
    const f=getFile(s.fileId);
    const fname=f?.name||'（已刪除）';
    const t1=s.startAt?markNextDay(fmtT(new Date(s.startAt)),s.startAt,dayRef):'';
    const t2=s.endAt?markNextDay(fmtT(new Date(s.endAt)),s.endAt,dayRef):'';
    const range=t1&&t2?t1+' ~ '+t2:'';
    const ms=s.durationMs||(s.mins||0)*60000;
    const dur=ms<60000?fmtMs(ms):`${Math.floor(ms/3600000)}小時${Math.floor((ms%3600000)/60000)}分鐘`.replace(/^0小時/,'');
    let progText='—';
    if(s.workloadAtTime&&s.progressAfter!=null){
      const pct=Math.round((s.progressAfter/s.workloadAtTime)*100);
      const deltaPct=s.progressDelta?Math.round((s.progressDelta/s.workloadAtTime)*100):0;
      progText=`${pct}%${deltaPct?' (+'+deltaPct+'%)':''}`;
    }
    const moodText=Array.isArray(s.mood)&&s.mood.length?s.mood.join('、'):'—';
    const acts=`<div class="row-acts"><button data-ws-edit="${s.id}" title="編輯"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button><button data-ws-del="${s.id}" title="刪除"><svg viewBox="0 0 24 24"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M8 7l1 12h6l1-12"/></svg></button></div>`;
    return {html:`<tr><td>${escH(range)}</td><td>${escH(fname)}</td><td>${escH(dur)}</td><td>${escH(progText)}</td><td>${Number(s.interruptions||0)}</td><td>${escH(moodText)}</td><td>${acts}</td></tr>`, ms};
  };
  let html='<div style="font-size:12px;color:var(--text3);margin-bottom:6px">總統計</div>';
  let totalMs=0;
  if(!sessions.length){
    html+=`<table class="rec-tbl">${thead}<tbody><tr><td colspan="7" style="color:var(--text4);font-size:12px;text-align:center;padding:10px">暫無工作紀錄</td></tr></tbody></table>`;
  }else if(filterMode==='range'){
    const groups=groupRowsByDay(sessions,sessionDayKey);
    groups.forEach(([day,rs])=>{
      html+=`<div class="rec-day-divider"><span>${escH(day||'—')}</span></div>`;
      let dayMs=0;
      const rowsHtml=rs.map(s=>{const r=sessionRow(s,day||today);dayMs+=r.ms;totalMs+=r.ms;return r.html}).join('');
      const dayInt=rs.reduce((n,s)=>n+Number(s.interruptions||0),0);
      const dayDurText=dayMs<60000?fmtMs(dayMs):`${Math.floor(dayMs/3600000)}小時${Math.floor((dayMs%3600000)/60000)}分鐘`.replace(/^0小時/,'');
      html+=`<div class="rec-day-group"><table class="rec-tbl">${thead}<tbody>${rowsHtml}<tr style="background:rgba(178,158,210,0.06);font-weight:500"><td>—</td><td>當日專注時長</td><td>${escH(dayDurText)}</td><td>—</td><td>${dayInt}</td><td>—</td><td></td></tr></tbody></table></div>`;
    });
    // Range total
    const totalText=totalMs<60000?fmtMs(totalMs):`${Math.floor(totalMs/3600000)}小時${Math.floor((totalMs%3600000)/60000)}分鐘`.replace(/^0小時/,'');
    const totalInt=sessions.reduce((n,s)=>n+Number(s.interruptions||0),0);
    html+=`<div class="rec-day-divider"><span>區間合計</span></div><table class="rec-tbl"><tbody><tr style="background:rgba(178,158,210,0.1);font-weight:500"><td>—</td><td>區間總專注時長</td><td>${escH(totalText)}</td><td>—</td><td>${totalInt}</td><td>—</td><td></td></tr></tbody></table>`;
  }else{
    const rowsHtml=sessions.map(s=>{const r=sessionRow(s,today);totalMs+=r.ms;return r.html}).join('');
    const totalText=totalMs<60000?fmtMs(totalMs):`${Math.floor(totalMs/3600000)}小時${Math.floor((totalMs%3600000)/60000)}分鐘`.replace(/^0小時/,'');
    const totalInt=sessions.reduce((n,s)=>n+Number(s.interruptions||0),0);
    html+=`<table class="rec-tbl">${thead}<tbody>${rowsHtml}<tr style="background:rgba(178,158,210,0.06);font-weight:500"><td>—</td><td>今日總專注時長</td><td>${escH(totalText)}</td><td>—</td><td>${totalInt}</td><td>—</td><td></td></tr></tbody></table>`;
  }

  // ── Tables 2..N: per-project advancement ──
  // Show steps in window [today, today+7d) OR overdue (time < today AND not done)
  const todayStart=new Date();todayStart.setHours(0,0,0,0);
  const cutoff=new Date(todayStart.getTime()+15*864e5);
  const stepInWindow=s=>{
    if(!s.time)return false;
    if(s.done)return false; // Done steps never show in log/calendar (B/1)
    const t=new Date(s.time);
    return (t>=todayStart&&t<cutoff)||(t<todayStart);
  };
  const projects=(S.workspace.projects||[]).filter(p=>{
    return (p.children||[]).filter(c=>!c.archived).some(c=>(c.steps||[]).some(stepInWindow));
  });
  // Sort priority: overdue (longest-delayed first) → upcoming (closest first) → no-activity bottom
  const __nowISO=new Date().toISOString();
  const projectRecency=(p)=>{
    let overdue='', upcoming='';
    (p.children||[]).filter(c=>!c.archived).forEach(c=>{
      (c.steps||[]).forEach(s=>{
        if(s.done) return;
        const t=s.time||'';
        if(!t) return;
        if(t<__nowISO){ if(!overdue||t<overdue) overdue=t; }
        else { if(!upcoming||t<upcoming) upcoming=t; }
      });
    });
    return {overdue,upcoming};
  };
  projects.sort((a,b)=>{
    const ra=projectRecency(a), rb=projectRecency(b);
    if(ra.overdue && rb.overdue){ return ra.overdue<rb.overdue ? -1 : ra.overdue>rb.overdue ? 1 : 0; }
    if(ra.overdue) return -1;
    if(rb.overdue) return 1;
    if(ra.upcoming && rb.upcoming){ return ra.upcoming<rb.upcoming ? -1 : ra.upcoming>rb.upcoming ? 1 : 0; }
    if(ra.upcoming) return -1;
    if(rb.upcoming) return 1;
    return 0;
  });
  projects.forEach(p=>{
    const childrenWithRecentSteps=(p.children||[]).filter(c=>!c.archived).map(c=>{
      const recent=(c.steps||[]).filter(stepInWindow);
      recent.sort((a,b)=>new Date(a.time)-new Date(b.time));
      let overdue='', upcoming='';
      (c.steps||[]).forEach(s=>{
        if(s.done) return;
        const t=s.time||'';
        if(!t) return;
        if(t<__nowISO){ if(!overdue||t<overdue) overdue=t; }
        else { if(!upcoming||t<upcoming) upcoming=t; }
      });
      return {child:c,steps:recent,_overdue:overdue,_upcoming:upcoming};
    }).filter(x=>x.steps.length>0);
    // Sort: overdue (longest delayed first) → upcoming (closest first) → bottom
    childrenWithRecentSteps.sort((a,b)=>{
      if(a._overdue && b._overdue){ return a._overdue<b._overdue ? -1 : a._overdue>b._overdue ? 1 : 0; }
      if(a._overdue) return -1;
      if(b._overdue) return 1;
      if(a._upcoming && b._upcoming){ return a._upcoming<b._upcoming ? -1 : a._upcoming>b._upcoming ? 1 : 0; }
      if(a._upcoming) return -1;
      if(b._upcoming) return 1;
      return 0;
    });
    if(!childrenWithRecentSteps.length)return;
    html+=`<div style="font-size:12px;color:var(--text3);margin:14px 0 6px">項目：${escH(p.name||'')}</div>`;
    html+='<table class="rec-tbl"><thead><tr><th>子項目</th><th>近期任務步驟</th><th>時間管理</th></tr></thead><tbody>';
    childrenWithRecentSteps.forEach(({child,steps})=>{
      steps.forEach((st,idx)=>{
        const dDays=Math.floor((new Date(st.time)-todayStart)/864e5);
        let timeText;
        if(dDays<0)timeText=`已拖延 ${-dDays} 天`;
        else if(dDays===0)timeText='今日';
        else timeText=`還有 ${dDays} 天`;
        const cellChild=idx===0?escH(child.name||''):'';
        const cellStyle=idx===0?'':'border-top:1px dashed var(--border)';
        const colorStyle=dDays<0?'color:#c44':'';
        html+=`<tr style="${colorStyle}"><td style="${cellStyle}">${cellChild}</td><td>${escH(st.name||'')}</td><td>${escH(timeText)}</td></tr>`;
      });
    });
    html+='</tbody></table>';
  });

  wrap.innerHTML=html;
  wrap.querySelectorAll('[data-ws-edit]').forEach(b=>{
    b.onclick=(ev)=>{ev.stopPropagation();recOpenWorkSessionEdit(b.dataset.wsEdit);};
  });
  wrap.querySelectorAll('[data-ws-del]').forEach(b=>{
    b.onclick=(ev)=>{
      ev.stopPropagation();
      const sid=b.dataset.wsDel;
      S.workspace.workSessions=(S.workspace.workSessions||[]).filter(s=>s.id!==sid);
      if(typeof wsSave==='function')wsSave();
      if(typeof recRenderLogBody==='function')recRenderLogBody();
      if(typeof RM==='function')setTimeout(RM,0);
    };
  });
}

function recFilterRows(pid){
  const fk=S.recFilters[pid]||{mode:'day',day:getActiveLogicalDay()};
  const all=logsFor(pid);
  let filtered;
  if(fk.mode==='day')filtered=all.filter(r=>r.executiveDate===fk.day);
  else filtered=all.filter(r=>r.executiveDate>=(fk.from||'')&&r.executiveDate<=(fk.to||'9'));
  // Stable ascending sort: old → new. Rows without executiveTime keep original order.
  return filtered.map((r,i)=>({r,i})).sort((a,b)=>{
    const ta=a.r.executiveTime||'',tb=b.r.executiveTime||'';
    if(!ta&&!tb)return a.i-b.i;
    if(!ta)return 1;if(!tb)return -1;
    const da=a.r.executiveDate+'T'+ta,db=b.r.executiveDate+'T'+tb;
    if(da===db)return a.i-b.i;
    return da<db?-1:1;
  }).map(x=>x.r);
}

// Group rows by day key, returning ordered [dayKey, rows[]] pairs
function groupRowsByDay(rows, getDayKey){
  const map=new Map();
  rows.forEach(r=>{
    const k=getDayKey(r)||'';
    if(!map.has(k))map.set(k,[]);
    map.get(k).push(r);
  });
  return Array.from(map.entries()).sort((a,b)=>a[0]<b[0]?-1:a[0]>b[0]?1:0);
}

function recRenderTable(pid){
  const wrap=document.querySelector(`[data-rtw="${pid}"]`);if(!wrap)return;
  const panel=REC_PANELS.find(p=>p.id===pid);
  const rows=recFilterRows(pid);
  const fk=S.recFilters[pid]||{mode:'day'};
  const isRange=fk.mode==='range';
  // Filter out hiddenInTable fields, then add tableExtraColumns as virtual columns
  const visibleFields=panel.fields.filter(f=>!f.hiddenInTable);
  const extraCols=Array.isArray(panel.tableExtraColumns)?panel.tableExtraColumns:[];
  const cols=['executiveTime',...visibleFields.map(f=>f.key),...extraCols.map(c=>c.key),'__actions'];
  // map column key → label and optional value transform
  const colMeta={};
  visibleFields.forEach(f=>{colMeta[f.key]={label:f.label,transform:(panel.tableTransform&&panel.tableTransform[f.key])||null}});
  extraCols.forEach(ec=>{colMeta[ec.key]={label:ec.label,transform:ec.compute||null,virtual:true}});
  const pn=n=>{const v=Number(n);return Number.isFinite(v)?v:0};

  // ── Weight row for selfcleaning ──
  const weightRowForDay=(day)=>{
    const wEntry=logsFor('weight').find(w=>w.executiveDate===day||w.logicalDay===day);
    const wVal=wEntry?wEntry.value:null;
    const display=wVal?escH(wVal)+' kg':'<span style="color:var(--text4)">點擊記錄</span>';
    const middleEmpty='<td></td>'.repeat(Math.max(0,cols.length-4));
    return `<tr style="background:rgba(178,158,210,0.06)"><td></td><td>體重</td>${middleEmpty}<td>${display}</td><td><div class="row-acts"><button data-wedit="${day}" title="編輯體重"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button></div></td></tr>`;
  };
  let weightRowHtml='';
  if(pid==='selfcleaning' && fk && fk.mode==='day'){
    const day=fk.day||calendarDayKey(new Date());
    weightRowHtml=weightRowForDay(day);
  }

  if(!rows.length&&!weightRowHtml&&!(pid==='selfcleaning'&&isRange)){wrap.innerHTML='<div class="rec-empty">暫無紀錄</div>';return}

  // Build summary row (over whole range)
  const computeSum=(rs)=>{
    let sc={};
    if(pid==='food'){
      const ext=rs.filter(r=>r.way==='外食').length;
      sc={way:'外食 '+ext+' 次',energy:rs.reduce((s,r)=>s+pn(r.energy),0)+' Kcal',protein:rs.reduce((s,r)=>s+pn(r.protein),0)+' g',fiber:rs.reduce((s,r)=>s+pn(r.fiber),0)+' g',sugar:rs.reduce((s,r)=>s+pn(r.sugar),0)+' g',salt:rs.reduce((s,r)=>s+pn(r.salt),0)+' g',fat:rs.reduce((s,r)=>s+pn(r.fat),0)+' g'};
    }
    if(pid==='drink'){
      const eff=rs.reduce((s,r)=>s+pn(r.amount)*(r.type==='純飲用水'?1:r.type==='清淡茶飲'?0.95:0.7),0);
      sc={amount:Math.round(eff)+' ml'};
    }
    if(pid==='expense'||pid==='income'){
      sc={amount:rs.reduce((s,r)=>s+pn(r.amount),0)+' 円'};
    }
    return sc;
  };
  const sumCells=computeSum(rows);
  const hasSummary=Object.keys(sumCells).length>0;
  const emptyInline=(!rows.length&&weightRowHtml)?`<tr><td colspan="${cols.length}" style="color:var(--text4);font-size:12px;padding:6px 0">暫無自我清潔紀錄</td></tr>`:'';

  // Render row HTML for a set of rows (no thead/tfoot)
  const rowsHtml=(rs)=>rs.map(r=>`<tr>${cols.map(c=>{
    if(c==='__actions')return`<td><div class="row-acts"><button data-redit="${pid}" data-rid="${r.id}" title="編輯"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button><button data-rdel="${pid}" data-rid="${r.id}" title="刪除"><svg viewBox="0 0 24 24"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M8 7l1 12h6l1-12"/></svg></button></div></td>`;
    if(c==='executiveTime')return`<td>${escH(markNextDay(r.executiveTimeLabel||r.executiveTime||'',r.executiveTime,r.executiveDate))}</td>`;
    const meta=colMeta[c];
    if(meta && meta.transform){
      try{ return `<td>${escH(recFormatVal(meta.transform(r)))}</td>`; }
      catch(err){ return '<td>–</td>'; }
    }
    return`<td>${escH(recFormatVal(r[c]))}</td>`;
  }).join('')}</tr>`).join('');
  const theadHtml=`<thead><tr>${cols.map(c=>c==='executiveTime'?'<th>時間</th>':c==='__actions'?'<th></th>':`<th>${escH((colMeta[c]&&colMeta[c].label)||c)}</th>`).join('')}</tr></thead>`;
  const tfootHtml=hasSummary?`<tfoot><tr>${cols.map(c=>{
    if(c==='executiveTime')return'<td>合計</td>';
    if(c==='__actions')return'<td></td>';
    return`<td>${escH(sumCells[c]||'')}</td>`;
  }).join('')}</tr></tfoot>`:'';

  if(isRange){
    // Per-day tables with dividers
    const groups=groupRowsByDay(rows,r=>r.executiveDate||'');
    // For selfcleaning, also expand range to include all days even without entries
    let dayList;
    if(pid==='selfcleaning'){
      const dayKeysWithEntries=new Set(groups.map(g=>g[0]).filter(Boolean));
      const fromDay=fk.from||'', toDay=fk.to||'';
      const rangeDays=[];
      if(fromDay&&toDay){
        try{
          const start=new Date(fromDay+'T00:00:00');
          const end=new Date(toDay+'T00:00:00');
          const d=new Date(start);
          while(d<=end){ rangeDays.push(calendarDayKey(d)); d.setDate(d.getDate()+1); }
        }catch{}
      }
      dayList=Array.from(new Set([...rangeDays,...dayKeysWithEntries])).sort();
    } else {
      dayList=groups.map(g=>g[0]);
    }
    const groupMap=new Map(groups);
    let html='';
    dayList.forEach((day,idx)=>{
      const rs=groupMap.get(day)||[];
      const divStyle=idx===0?'margin-top:4px':'';
      html+=`<div class="rec-day-divider" style="${divStyle}"><span>${escH(day||'—')}</span></div>`;
      const weightRow=(pid==='selfcleaning')?weightRowForDay(day):'';
      const bodyRows=weightRow+(rs.length?rowsHtml(rs):(pid==='selfcleaning'?`<tr><td colspan="${cols.length}" style="color:var(--text4);font-size:12px;padding:6px 0">暫無自我清潔紀錄</td></tr>`:''));
      html+=`<div class="rec-day-group"><table class="rec-tbl">${theadHtml}<tbody>${bodyRows}</tbody></table></div>`;
    });
    if(!dayList.length){html='<div class="rec-empty">暫無紀錄</div>';}
    // Summary of whole range at the end
    if(hasSummary){
      html+=`<div class="rec-day-divider"><span>區間合計</span></div><table class="rec-tbl"><tbody></tbody>${tfootHtml}</table>`;
    }
    wrap.innerHTML=html;
  }else{
    wrap.innerHTML=`<table class="rec-tbl">${theadHtml}<tbody>${weightRowHtml}${emptyInline}${rowsHtml(rows)}</tbody>${tfootHtml}</table>`;
  }
  wrap.querySelectorAll('[data-redit]').forEach(b=>b.onclick=()=>recOpenEdit(b.dataset.redit,b.dataset.rid));
  wrap.querySelectorAll('[data-rdel]').forEach(b=>b.onclick=()=>{deleteLog(b.dataset.rid);recRenderTable(b.dataset.rdel)});
  wrap.querySelectorAll('[data-wedit]').forEach(b=>b.onclick=()=>{
    const day=b.dataset.wedit;
    const existing=logsFor('weight').find(w=>w.executiveDate===day||w.logicalDay===day);
    const v=prompt('輸入體重（kg）',existing?existing.value:'');
    if(v!==null&&v.trim()){
      if(existing)updateLog(existing.id,{value:v.trim()});
      else addLog('weight',{id:uid(),value:v.trim(),logicalDay:day,executiveDate:day,executiveTime:toL(new Date()),executiveTimeLabel:fmt(new Date()),createdAt:Date.now()});
      recRenderTable('selfcleaning');
    }
  });
}

// ── Category (tag group) manager modal ──
// Map tag group → list of {panelId, fieldKey, fieldType, groupBy, subValue}
// Supports sub-grouped tag groups like 'nutrients_name_藥劑' by also matching
// the base group and filtering by the sub-grouping field value.
function tagGroupSites(tagGroup){
  const sites=[];
  REC_PANELS.forEach(p=>p.fields.forEach(f=>{
    if(!f.tagGroup) return;
    if(f.tagGroup===tagGroup){
      sites.push({panelId:p.id,fieldKey:f.key,fieldType:f.type,groupBy:null,subValue:null});
    } else if(f.tagGroupBy && tagGroup.startsWith(f.tagGroup+'_')){
      const sub=tagGroup.slice((f.tagGroup+'_').length);
      sites.push({panelId:p.id,fieldKey:f.key,fieldType:f.type,groupBy:f.tagGroupBy,subValue:sub});
    }
  }));
  return sites;
}
// Count how many log records use a given tag value
function tagUsageCount(tagGroup,tagValue){
  const sites=tagGroupSites(tagGroup);
  if(!sites.length) return 0;
  let count=0;
  (S.logs||[]).forEach(r=>{
    sites.forEach(s=>{
      if(r.panelId!==s.panelId) return;
      if(s.groupBy && String(r[s.groupBy]||'')!==s.subValue) return;
      const v=r[s.fieldKey];
      if(v==null) return;
      if(s.fieldType==='tagDosage' && Array.isArray(v)){
        if(v.some(it=>it&&it.tag===tagValue)) count++;
      } else if(Array.isArray(v)){ if(v.includes(tagValue)) count++; }
      else if(String(v)===String(tagValue)) count++;
    });
  });
  return count;
}
// Rename a tag across S.rtags and all matching logs
function renameTag(tagGroup,oldVal,newVal){
  oldVal=String(oldVal||'').trim(); newVal=String(newVal||'').trim();
  if(!tagGroup||!oldVal||!newVal||oldVal===newVal) return;
  const list=S.rtags[tagGroup]||[];
  const idx=list.indexOf(oldVal);
  if(idx<0) return;
  // Prevent collision: if newVal already exists, just delete old
  if(list.includes(newVal)){
    S.rtags[tagGroup]=list.filter(x=>x!==oldVal);
  }else{
    list[idx]=newVal;
    list.sort((a,b)=>a.localeCompare(b,'zh-Hant'));
  }
  // Update all logs that reference oldVal
  const sites=tagGroupSites(tagGroup);
  (S.logs||[]).forEach(r=>{
    sites.forEach(s=>{
      if(r.panelId!==s.panelId) return;
      if(s.groupBy && String(r[s.groupBy]||'')!==s.subValue) return;
      const v=r[s.fieldKey];
      if(s.fieldType==='tagDosage' && Array.isArray(v)){
        v.forEach(it=>{ if(it&&it.tag===oldVal) it.tag=newVal; });
      } else if(Array.isArray(v)){
        const i2=v.indexOf(oldVal);
        if(i2>=0){ v[i2]=newVal; }
      } else if(String(v)===String(oldVal)){
        r[s.fieldKey]=newVal;
      }
    });
  });
  __dirty.rtags=true; __dirty.records=true;
}

// ── Medication schedule helpers ──────────────────────────────
// Each schedule = {
//   id, drugName, drugType,
//   frequencyMode: 'daily' | 'weekly',
//   dailyTimes: 1|2|3,        // when mode==='daily'
//   weeklyDays: [0..6],       // when mode==='weekly' (0=Sun..6=Sat)
//   startDate, endDate        // YYYY-MM-DD inclusive
// }
function getMedSchedules(){
  if(!Array.isArray(S.workspace.medSchedules)) S.workspace.medSchedules=[];
  return S.workspace.medSchedules;
}
function isMedScheduleActiveToday(sch){
  if(!sch) return false;
  const today=calendarDayKey(new Date());
  if(sch.startDate && today<sch.startDate) return false;
  if(sch.endDate && today>sch.endDate) return false;
  if(sch.frequencyMode==='weekly'){
    const dow=new Date().getDay();
    const days=Array.isArray(sch.weeklyDays)?sch.weeklyDays:[];
    if(!days.includes(dow)) return false;
  }
  return true;
}
// Count today's nutrient logs that include this schedule's drug
function countMedLogsToday(sch){
  if(!sch) return 0;
  const today=calendarDayKey(new Date());
  let cnt=0;
  (S.logs||[]).forEach(l=>{
    if(l.panelId!=='nutrients') return;
    if(l.executiveDate!==today) return;
    const items=Array.isArray(l.items)?l.items:[];
    if(items.some(it=>it && it.tag===sch.drugName)) cnt++;
  });
  return cnt;
}
// Aggregate reminder across active schedules → nutrients button
function getMedReminderState(){
  const schedules=getMedSchedules().filter(isMedScheduleActiveToday);
  if(!schedules.length) return { due:false };
  const now=new Date();
  const wake=reminderTodayWakeTime();
  const at=(h,m)=>{const d=new Date(); d.setHours(h,m||0,0,0); return d;};
  let outstanding=0;
  schedules.forEach(sch=>{
    const cnt=countMedLogsToday(sch);
    if(sch.frequencyMode==='weekly'){
      if(cnt===0 && now>=wake) outstanding++;
      return;
    }
    const times=Number(sch.dailyTimes||1);
    if(times<=1){
      if(cnt===0 && now>=wake) outstanding++;
    } else if(times===2){
      if(cnt===0 && now>=wake) outstanding++;
      else if(cnt===1 && now>=at(20)) outstanding++;
    } else { // 3x
      if(cnt===0 && now>=wake) outstanding++;
      else if(cnt===1 && now>=at(11)) outstanding++;
      else if(cnt===2 && now>=at(17)) outstanding++;
    }
  });
  return { due: outstanding>0, badge: outstanding>1 ? String(outstanding) : null };
}

// ── Reminder logic ─────────────────────────────────────────────
// Returns { due:boolean, badge?:string } for each record panel.
function reminderTodayWakeTime(){
  const todayKey=calendarDayKey(new Date());
  let latest=null;
  (S.logs||[]).forEach(l=>{
    if(l&&l.panelId==='sleep'&&(l.kind==='sleep'||l.kind==='stayed_up')&&l.endAt){
      const w=new Date(l.endAt);
      if(!isNaN(w)&&calendarDayKey(w)===todayKey){ if(!latest||w>latest)latest=w; }
    }
  });
  if(latest) return latest;
  const fb=new Date(); fb.setHours(7,0,0,0);
  return fb;
}
function reminderLastLogTime(pid,filterFn){
  let last=null;
  (S.logs||[]).forEach(l=>{
    if(l.panelId!==pid) return;
    if(filterFn && !filterFn(l)) return;
    const t=l.executiveTime?new Date(l.executiveTime):(l.createdAt?new Date(l.createdAt):null);
    if(t&&(!last||t>last)) last=t;
  });
  return last;
}
function getReminderState(pid){
  const now=new Date();
  const today=calendarDayKey(now);
  const todayLogs=(S.logs||[]).filter(l=>l.panelId===pid && l.executiveDate===today);
  const wake=reminderTodayWakeTime();
  const at=(h,m)=>{const d=new Date(); d.setHours(h,m||0,0,0); return d;};
  if(pid==='drink'){
    const lastDrink=todayLogs.reduce((m,l)=>{const t=l.executiveTime?new Date(l.executiveTime):null; return (t&&(!m||t>m))?t:m;},null);
    const ref=lastDrink||wake;
    return { due: now>=wake && (now-ref)>=2*3600*1000 };
  }
  if(pid==='food'){
    const cnt=todayLogs.length;
    if(cnt===0) return { due: now>=wake };
    if(cnt===1) return { due: now>=at(11) };
    if(cnt===2) return { due: now>=at(17) };
    return { due:false };
  }
  if(pid==='bowels'){
    return { due: todayLogs.length===0 && now>=wake };
  }
  if(pid==='selfcleaning'){
    const dailyItems=['潔面','刷牙','洗澡'];
    const dailyCount=todayLogs.filter(l=>{
      const items=Array.isArray(l.items)?l.items:[];
      return items.some(i=>dailyItems.includes(i));
    }).length;
    let due=false;
    if(dailyCount===0 && now>=wake) due=true;
    else if(dailyCount===1 && now>=at(20)) due=true;
    // 剪指甲 multi-day badge
    let nailBadge=null;
    const lastNail=reminderLastLogTime('selfcleaning',l=>Array.isArray(l.items)&&l.items.includes('剪指甲'));
    if(!lastNail){ nailBadge='✂'; }
    else {
      const daysSince=Math.floor((now-lastNail)/86400000);
      if(daysSince>=15) nailBadge='✂';
    }
    return { due, badge:nailBadge };
  }
  if(pid==='skincare'){
    const hasMakeup=todayLogs.some(l=>l.type==='化妝');
    if(!hasMakeup) return { due:false };
    const cleansedAfter20=todayLogs.some(l=>{
      if(l.type!=='護膚') return false;
      const t=l.executiveTime?new Date(l.executiveTime):null;
      return t && t>=at(20);
    });
    return { due: now>=at(20) && !cleansedAfter20 };
  }
  if(pid==='exercise'){
    const last=reminderLastLogTime('exercise');
    if(!last) return { due:true };
    const daysSince=Math.floor((now-last)/86400000);
    return { due: daysSince>=4 };
  }
  if(pid==='period'){
    // Bleeding reminder: while an event is in progress (yesterday is part of
    // it) and today's Dn would still be ≤ 7, prompt for today's record.
    // Once today has a record, stop reminding. After D8, stop reminding.
    if(todayLogs.length>0) return { due:false };
    try{
      const an=getPeriodAnalysis();
      const events=an.events||[];
      if(!events.length) return { due:false };
      const last=events[events.length-1];
      const lastDay=last.days[last.days.length-1];
      const gap=_daysBetween(lastDay,today);
      // Yesterday (gap 1) was part of the event → reminder active
      if(gap!==1) return { due:false };
      const todayDn=_daysBetween(last.d1,today)+1;
      return { due: todayDn<=7 };
    }catch{ return { due:false }; }
  }
  // Medication schedule reminders ride on the nutrients button
  if(pid==='nutrients'){
    try{ return getMedReminderState(); }catch{ return { due:false }; }
  }
  return { due:false };
}

// Sleep reminder: due after 23:00 if today's most-recent sleep wasn't
// recorded *today* (i.e. user hasn't gone to bed yet).
function reminderSleepDue(){
  const now=new Date();
  if(now.getHours()<23) return false;
  const todayKey=calendarDayKey(now);
  // Has the user logged a sleep that *started* on today's calendar day?
  const startedToday=(S.logs||[]).some(l=>{
    if(!l||l.panelId!=='sleep') return false;
    if(l.kind!=='sleep' && l.kind!=='stayed_up' && l.kind!=='nap') return false;
    if(!l.startAt) return false;
    return calendarDayKey(new Date(l.startAt))===todayKey;
  });
  return !startedToday;
}
